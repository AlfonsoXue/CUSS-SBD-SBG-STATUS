  var FIELDS = ['code','region','phase','kpi','cuss','sbd','sbg','cussVendor','sbdVendor','sbgVendor','cussDate','sbdDate','note','schedNote'];
  function normalize(s){
    var o = {id:s.id};
    FIELDS.forEach(function(f){ o[f] = s[f]!=null ? s[f] : (f==='kpi'?false:''); });
    if(!STATUS[o.cuss]) o.cuss='none';
    if(!STATUS[o.sbd]) o.sbd='none';
    if(!STATUS[o.sbg]) o.sbg='none';
    return o;
  }

  function load(){
    try{
      var raw = localStorage.getItem(KEY);
      if(raw){
        var arr = JSON.parse(raw);
        if(Array.isArray(arr) && arr.length){
          nid = Math.max.apply(null, arr.map(function(s){ return s.id||0; })) + 1;
          return arr.map(normalize);
        }
      }
    }catch(e){}
    return seed();
  }
  function save(stations){ try{ localStorage.setItem(KEY, JSON.stringify(stations)); }catch(e){} }

  var state = { stations: load(), selectedId: null, quickMode: false, groupMode: 'phase' };

  // ---- mutations ----
  function update(stations){ save(stations); state.stations = stations; render(); }
  function setField(id, field, val){
    update(state.stations.map(function(s){
      if(s.id===id){ var n = {}; for(var k in s) n[k]=s[k]; n[field]=val; return n; }
      return s;
    }));
  }
  function cycle(id, field){
    var s = find(id); if(!s) return;
    var i = ORDER.indexOf(s[field]);
    setField(id, field, ORDER[(i+1)%ORDER.length]);
  }
  function find(id){ for(var i=0;i<state.stations.length;i++) if(state.stations[i].id===id) return state.stations[i]; return null; }
  function select(id){ state.selectedId = id; render(); }
  function closePanel(){ state.selectedId = null; render(); }
  function toggleQuick(){ state.quickMode = !state.quickMode; render(); }
  function setGroupMode(m){ state.groupMode = m; render(); }

  function addStation(){
    var sel = find(state.selectedId);
    var st = normalize({ id:nid++, code:'新站', region:(sel?sel.region:''), phase:(sel?sel.phase:PHASES[0]) });
    var stations = state.stations.concat([st]);
    save(stations); state.stations = stations; state.selectedId = st.id; render();
  }
  function deleteStation(id){
    var stations = state.stations.filter(function(s){ return s.id!==id; });
    save(stations); state.stations = stations; state.selectedId = null; render();
  }
  function resetData(){
    if(!window.confirm('確定要還原為原始資料庫嗎？目前的編輯將會清除。')) return;
    nid = 1;
    var stations = seed();
    save(stations); state.stations = stations; state.selectedId = null; render();
  }

  // ---- export ----
  function download(name, blob){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = name; document.body.appendChild(a); a.click();
    document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }
  function exportJSON(){
    var out = state.stations.map(function(s){ var o={}; FIELDS.forEach(function(f){ o[f]=s[f]; }); return o; });
    download('自助化設備狀態.json', new Blob([JSON.stringify(out, null, 2)], {type:'application/json'}));
  }

    var rows = state.stations.map(function(s){
      return [s.code, s.region, s.phase, L[s.cuss].label, s.cussVendor, s.cussDate,
              L[s.sbd].label, s.sbdVendor, s.sbdDate, L[s.sbg].label, s.sbgVendor,
              s.kpi?'是':'', s.note, s.schedNote].map(esc).join(',');
    });
    var csv = '﻿' + [head.map(esc).join(','), rows.join('\r\n')].join('\r\n');
    download('自助化設備狀態.csv', new Blob([csv], {type:'text/csv;charset=utf-8'}));
  }

    if(window.html2canvas) return Promise.resolve(window.html2canvas);

      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = function(){ res(window.html2canvas); };
      s.onerror = function(){ rej(new Error('load failed')); };
      document.head.appendChild(s);
    });
    return _h2c;
  }

  function stage(n, code, desc, f){

      var w = (c[k]/total)*100;
      return { w:+w.toFixed(2), color:STATUS[k].color, textOn:STATUS[k].textOn, label: w>=6 ? String(c[k]) : '' };
    });
    var legend = ORDER.map(function(k){ return { color:STATUS[k].color, mark:STATUS[k].mark, text:c[k], label:STATUS[k].label }; });
    return { n:n, code:code, desc:desc, pctLabel: pct+'%', online:c.online, segs:segs, legend:legend };
  }

      +     statusRow(sel,'sbd','SBD 自助行李託運現況')
      +     statusRow(sel,'sbg','SBG 自助登機門現況')
      +     '<div data-action="toggleKpi" data-id="'+sel.id+'" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid #DFE3E4;border-radius:10px;cursor:pointer">'
      +       '<div style="display:flex;flex-direction:column;gap:2px">'
      +         '<span style="font-size:13px;font-weight:700;color:#141819">2026 經理人 KPI 場站</span>'
      +         '<span style="font-size:11px;color:#8A938F">標記後方塊右上角顯示白色圓點</span>'
      +       '</div>'
      +       '<span style="flex:none;width:44px;height:25px;border-radius:13px;background:'+kpiBg+';position:relative;transition:background .18s ease"><span style="position:absolute;top:3px;left:'+kpiKnob+';width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .18s ease"></span></span>'
      +     '</div>'
      +     '<label style="display:flex;flex-direction:column;gap:5px">'
      +       '<span style="font-size:11px;font-weight:700;color:#515A5D">各站進度（自動化綜整）</span>'
      +       '<textarea data-input="note" data-id="'+sel.id+'" rows="5" class="fld" style="font-size:12.5px;line-height:1.55;resize:vertical">'+esc(sel.note)+'</textarea>'
      +     '</label>'
      +     '<label style="display:flex;flex-direction:column;gap:5px">'
      +       '<span style="font-size:11px;font-weight:700;color:#515A5D">排程備註（CUSS 排程）</span>'
      +       '<textarea data-input="schedNote" data-id="'+sel.id+'" rows="3" class="fld" style="font-size:12.5px;line-height:1.55;resize:vertical">'+esc(sel.schedNote)+'</textarea>'
      +     '</label>'
      +   '</div>'
      +   '<div style="padding:14px 22px;border-top:1px solid #E4EBE6;display:flex;justify-content:space-between;align-items:center">'
      +     '<button data-action="deleteStation" data-id="'+sel.id+'" style="border:1px solid #F0C7C2;background:#FCEAE8;color:#C24626;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer">刪除場站</button>'
      +     '<button data-action="closePanel" style="border:none;background:#00853C;color:#fff;border-radius:20px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer">完成</button>'
      +   '</div>'
      + '</aside>'
      + '</div>';
  }

  function segBtn(mode, label){
    var active = state.groupMode===mode;
    return '<button data-action="group" data-mode="'+mode+'" style="border:none;background:'+(active?'#fff':'transparent')+';color:'+(active?'#00853C':'#6E787B')+';border-radius:14px;padding:5px 14px;font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:'+(active?'0 1px 2px rgba(20,40,30,.14)':'none')+'">'+label+'</button>';
  }

  function render(){
    hideTip();
    var stationCount = state.stations.length;
    var dataDate = '2026·05';
    var stages = [
      stage(1,'CUSS','自助報到 / 列印登機證','cuss'),
      stage(2,'SBD','自助行李託運','sbd'),
      stage(3,'SBG','自助登機門 / 生物辨識','sbg')
    ];
    var quickBg = state.quickMode ? '#00853C' : '#fff';
    var quickFg = state.quickMode ? '#fff' : '#00853C';
    var quickState = state.quickMode ? '：開' : '：關';

    var legendMaster = ORDER.map(function(k){
      return '<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6E787B"><span style="width:10px;height:10px;border-radius:2px;background:'+STATUS[k].color+'"></span>'+STATUS[k].mark+' '+STATUS[k].label+'</span>';
    }).join('') + '<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6E787B"><span style="width:10px;height:10px;border-radius:50%;background:#fff;border:1.4px solid #00853C"></span>2026 經理人 KPI 場站</span>';

    var sel = find(state.selectedId);
    var groupTitle = state.groupMode==='region' ? '區域 × 現況交叉檢視' : 'CUSS 建置上線時程軸 × 現況交叉檢視';
    var groupSub = state.groupMode==='region'
      ? '依所屬區域分組；色塊上緣＝CUSS 現況、下緣＝SBD 現況　·　白色圓點＝2026 經理人 KPI 場站'
      : '依建置時程分組；色塊上緣＝CUSS 現況、下緣＝SBD 現況　·　白色圓點＝2026 經理人 KPI 場站';

    var html =
      '<div style="min-height:100vh;display:flex;flex-direction:column">'
      + '<header style="display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;padding:16px 26px;background:#fff;border-bottom:1px solid #DFE3E4">'
      +   '<div style="display:flex;flex-direction:column;gap:3px">'
      +     '<div style="font-size:20px;font-weight:900;color:#00853C;letter-spacing:.5px">機場自助化設備建置儀表板</div>'
      +     '<div style="font-size:12px;color:#6E787B">旅客自助旅程 · 三階段設備覆蓋 &nbsp;|&nbsp; 全球 '+stationCount+' 個納管場站 &nbsp;|&nbsp; 資料基準 '+dataDate+'</div>'
      +   '</div>'
      +   '<div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">'
      +     '<button data-action="addStation" style="border:none;background:#00853C;color:#fff;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer">＋ 新增場站</button>'
      +     '<button data-action="toggleQuick" style="border:1.5px solid #00853C;background:'+quickBg+';color:'+quickFg+';border-radius:18px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer">快速切換模式'+quickState+'</button>'
      +     '<button data-action="exportPNG" style="border:1.5px solid #C7CDCF;background:#fff;color:#141819;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer">匯出圖片</button>'
      +     '<button data-action="exportJSON" style="border:1.5px solid #E4EBE6;background:#fff;color:#515A5D;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer">匯出 JSON</button>'
      +     '<button data-action="exportCSV" style="border:1.5px solid #E4EBE6;background:#fff;color:#515A5D;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer">匯出 CSV</button>'
      +     '<button data-action="resetData" style="border:1.5px solid #E4EBE6;background:#fff;color:#515A5D;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer">重設</button>'
      +   '</div>'
      + '</header>'
      + '<div style="padding:6px 26px 0;font-size:11.5px;color:#8A938F">'
      +   '提示：<b style="color:#00853C">游標移至方塊</b>可顯示完整資訊（現況／系統商／時程／各站進度）；點方塊開啟右側編輯面板。開啟「快速切換模式」後，點方塊<b style="color:#00853C">上半</b>循環切換 CUSS、點<b style="color:#00853C">下半</b>切換 SBD。'
      + '</div>'
      + '<div style="flex:1;padding:16px 26px 30px">'
      +   '<div id="cuss-board" style="background:#fff;border:1px solid #DFE3E4;border-radius:14px;padding:22px;display:flex;gap:22px;align-items:flex-start;box-shadow:0 1px 3px rgba(20,40,30,.06)">'
      +     '<section style="flex:none;width:486px;background:#F3F7F4;border-radius:12px;padding:20px 20px 22px">'
      +       '<div style="font-size:16px;font-weight:900;color:#00853C">三階段設備覆蓋率</div>'
      +       '<div style="font-size:11px;color:#6E787B;margin-top:3px">依目前 '+stationCount+' 個納管場站即時統計</div>'
      +       '<div style="display:flex;flex-direction:column;gap:14px;margin-top:16px">'+stages.map(stageHTML).join('')+'</div>'
      +     '</section>'
      +     '<section style="flex:1;min-width:0">'
      +       '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">'
      +         '<div style="font-size:16px;font-weight:900;color:#00853C">'+groupTitle+'</div>'
      +         '<div style="display:flex;background:#EEF2F0;border-radius:16px;padding:3px">'+segBtn('phase','依時程')+segBtn('region','依區域')+'</div>'
      +       '</div>'
      +       '<div style="font-size:11px;color:#6E787B;margin-top:3px">'+groupSub+'</div>'
      +       '<div style="display:flex;flex-direction:column;gap:2px;margin-top:16px">'+groupList().map(groupHTML).join('')+'</div>'
      +       '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-top:16px;padding-top:12px;border-top:1px solid #E4EBE6">'
      +         '<span style="font-size:11px;font-weight:700;color:#6E787B">圖例</span>'
      +         legendMaster
      +       '</div>'
      +     '</section>'
      +   '</div>'
      + '</div>'
      + '</div>'
      + (sel ? panelHTML(sel) : '');

    document.getElementById('app').innerHTML = html;
  }

  // ---- tooltip ----
  var tip = document.getElementById('tip');
  function tipRow(lbl, s, statusField, vendorField, dateField){
    var st = STATUS[s[statusField]];
    var extra = [];
    if(s[vendorField]) extra.push('系統商 '+esc(s[vendorField]));
    if(dateField && s[dateField]) extra.push(esc(s[dateField]));
    var tail = extra.length ? ' <span style="color:#9DB3A8">· '+extra.join(' · ')+'</span>' : '';
    return '<div style="display:flex;align-items:center;gap:6px;margin-top:3px"><span style="width:8px;height:8px;border-radius:2px;background:'+st.color+';flex:none"></span><b style="width:30px;display:inline-block">'+lbl+'</b>'+st.label+tail+'</div>';
  }
  function showTip(s, x, y){
    var head = '<div style="font-size:14px;font-weight:800;letter-spacing:.5px">'+esc(s.code)
      + (s.kpi?' <span style="font-size:9px;color:#8FE3B6;border:1px solid #8FE3B6;border-radius:6px;padding:0 4px;vertical-align:middle">KPI</span>':'')
      + '</div>'
      + '<div style="font-size:10.5px;color:#9DB3A8;margin-bottom:5px">'+esc(s.region||'—')+' · '+esc(s.phase)+'</div>';
    var rows = tipRow('CUSS',s,'cuss','cussVendor','cussDate')+tipRow('SBD',s,'sbd','sbdVendor','sbdDate')+tipRow('SBG',s,'sbg','sbgVendor',null);
    var note = s.note ? '<div style="margin-top:7px;padding-top:6px;border-top:1px solid rgba(255,255,255,.14);color:#C7D6CE;white-space:pre-wrap">'+esc(s.note)+'</div>' : '';
    tip.innerHTML = head + rows + note;
    tip.style.display = 'block';
    tip.style.opacity = '1';
    positionTip(x, y);
  }
  function positionTip(x, y){
    var w = tip.offsetWidth, h = tip.offsetHeight;
    var nx = x + 16, ny = y + 16;
    if(nx + w > window.innerWidth - 8) nx = x - w - 16;
    if(ny + h > window.innerHeight - 8) ny = window.innerHeight - h - 8;
    if(ny < 8) ny = 8;
    tip.style.left = nx + 'px';
    tip.style.top = ny + 'px';
  }
  function hideTip(){ tip.style.opacity = '0'; tip.style.display = 'none'; }

  // ---- event delegation ----
  var app = document.getElementById('app');
  app.addEventListener('click', function(e){
    var t = e.target.closest ? e.target.closest('[data-action]') : null;
    if(!t) return;
    var a = t.getAttribute('data-action');
    var id = t.getAttribute('data-id'); if(id!=null) id = +id;
    switch(a){
      case 'addStation': addStation(); break;
      case 'toggleQuick': toggleQuick(); break;
      case 'exportPNG': exportPNG(); break;
      case 'exportJSON': exportJSON(); break;
      case 'exportCSV': exportCSV(); break;
      case 'resetData': resetData(); break;
      case 'closePanel': closePanel(); break;
      case 'deleteStation': deleteStation(id); break;
      case 'group': setGroupMode(t.getAttribute('data-mode')); break;
      case 'toggleKpi': var s=find(id); if(s) setField(id,'kpi',!s.kpi); break;
      case 'setField': setField(id, t.getAttribute('data-field'), t.getAttribute('data-val')); break;
      case 'chipTop':
        if(state.quickMode){ hideTip(); cycle(id,'cuss'); } else select(id);
        break;
      case 'chipBot':
        if(state.quickMode){ hideTip(); cycle(id,'sbd'); } else select(id);
        break;
    }
  });
  app.addEventListener('change', function(e){
    var t = e.target;
    var inp = t.getAttribute && t.getAttribute('data-input');
    if(!inp) return;
    var id = +t.getAttribute('data-id');
    var val = t.value;
    if(inp==='code') val = (val||'').toUpperCase();
    setField(id, inp, val);
  });
  app.addEventListener('mouseover', function(e){
    var c = e.target.closest ? e.target.closest('[data-tip]') : null;
    if(!c) return;
    var s = find(+c.getAttribute('data-tip'));
    if(s) showTip(s, e.clientX, e.clientY);
  });
  app.addEventListener('mousemove', function(e){
    if(tip.style.display==='block') positionTip(e.clientX, e.clientY);
  });
  app.addEventListener('mouseout', function(e){
    var c = e.target.closest ? e.target.closest('[data-tip]') : null;
    if(!c) return;
    var to = e.relatedTarget;
    if(to && c.contains(to)) return;
    hideTip();
  });
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape' && state.selectedId!=null) closePanel();
  });

  render();
})();
</script>
</body>
</html>
