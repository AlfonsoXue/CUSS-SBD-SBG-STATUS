  // NB: never write the literal script open/close tag sequences in this file's own

  function statusFromText(v){
    var t = String(v==null?'':v).trim();
    if(!t) return 'none';
    if(LABEL2STATUS[t]) return LABEL2STATUS[t];
    if(/暫關|待重啟|暫停|暫緩/.test(t)) return 'paused';
    if(/無設備|無建置|未建置|未啟用|尚未|沒有|不適用|無規劃|n\/?a|^x$|^-+$|^—+$|^無$/i.test(t)) return 'none';
    if(/評估|規劃|協調|洽談|爭取|待場站|研議|討論/.test(t)) return 'evaluating';
    if(/建置|測試|進行|施工|導入|開發|安裝|認證|申請|準備|就位|待啟用/.test(t)) return 'building';
    if(/上線|啟用|已完成|完成|使用中|運作|正常|已建置|開通|已導入|✓|yes/i.test(t)) return 'online';
    if(/^(有|是|v|y|1|●)$/i.test(t)) return 'online';

  function truthy(v){ return /^(是|有|y|yes|true|v|✓|1|●|kpi)$/i.test(String(v==null?'':v).trim()); }

  // minimal RFC-4180 CSV parser (handles quotes, commas, CRLF, BOM)
  function parseCSV(text){
    if(text.charCodeAt(0)===0xFEFF) text = text.slice(1);

      var c=text[i];
      if(inQ){
        if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i+=2; continue; } inQ=false; i++; continue; }
        cur+=c; i++; continue;
      }
      if(c==='"'){ inQ=true; i++; continue; }
      if(c===','){ row.push(cur); cur=''; i++; continue; }
      if(c==='\r'){ i++; continue; }
      if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; i++; continue; }
      cur+=c; i++;
    }
    if(cur!==''||row.length){ row.push(cur); rows.push(row); }
    return rows.filter(function(r){ return r.some(function(c){ return String(c).trim()!==''; }); });

  // classify an Excel/CSV header cell → our field key (fuzzy, keyword based)

    if(/sbd/i.test(h)){ return vendor?'sbdVendor':(date?'sbdDate':'sbd'); }
    if(/sbg/i.test(h)){ return vendor?'sbgVendor':'sbg'; }

  function importFromCSVText(text){

    var code = hMap.code!=null ? String(row[hMap.code]==null?'':row[hMap.code]).trim() : '';
    if(!CODE_RE.test(code)){
      for(var i=0;i<row.length;i++){ var v=String(row[i]==null?'':row[i]).trim(); if(CODE_RE.test(v)){ code=v; break; } }
    }
    if(!CODE_RE.test(code)) return null;
    var rec = { code:code.toUpperCase() };
    ['region','phase','cussVendor','cussDate','sbdVendor','sbdDate','sbgVendor','note','schedNote'].forEach(function(f){
      if(hMap[f]!=null){ var v=row[hMap[f]]; if(v!=null && String(v).trim()!=='') rec[f]=String(v).trim(); }
    });
    ['cuss','sbd','sbg'].forEach(function(f){
      if(hMap[f]!=null){ var v=row[hMap[f]]; if(v!=null && String(v).trim()!=='') rec[f]=statusFromText(v); }
    });
    if(hMap.kpi!=null && String(row[hMap.kpi]||'').trim()!=='') rec.kpi = truthy(row[hMap.kpi]);
    if(hMap.bagTag!=null && String(row[hMap.bagTag]||'').trim()!=='') rec.bagTag = truthy(row[hMap.bagTag]);
    if(hMap.flights!=null){ var fl=+String(row[hMap.flights]).replace(/[^\d.]/g,''); if(fl) rec.flights=fl; }
    if(hMap.pax!=null){ var px=+String(row[hMap.pax]).replace(/[^\d.]/g,''); if(px) rec.pax=px; }
    return rec;
  }
  // parse either original Excel (全球自動化綜整 / CUSS排程) — fuzzy header detection,
  // merged across every worksheet by station code.
  function parseWorkbook(XLSX, wb){
    var all = {};
    (wb.SheetNames||[]).forEach(function(name){
      var ws = wb.Sheets[name]; if(!ws) return;
      var arr = XLSX.utils.sheet_to_json(ws, { header:1, blankrows:false, defval:'' });
      if(!arr.length) return;
      // pick the header row within the first few rows (most classifiable cells)
      var hRow=-1, hMap=null, best=0;
      for(var i=0;i<Math.min(arr.length,10);i++){
        var m={}, score=0;
        arr[i].forEach(function(cell,ci){
          var f=classifyHeader(cell); if(f && m[f]==null){ m[f]=ci; score++; }
          if(m.code==null && /場站|機場|站別|代碼|站碼|iata|airport|station|港站/i.test(String(cell))) m.code=ci;
        });
        var s = score + (m.code!=null?1:0);
        if(s>best){ best=s; hRow=i; hMap=m; }
      }
      if(hRow<0 || !hMap || best<2) return;
      for(var r=hRow+1;r<arr.length;r++){
        var rec = rowToRec(arr[r]||[], hMap);
        if(rec && rec.code){
          if(!all[rec.code]) all[rec.code] = { code:rec.code };
          for(var k in rec){ if(k==='code') continue; var v=rec[k]; if(v==null||v==='') continue; all[rec.code][k]=v; }
        }
      }
    });
    return Object.keys(all).map(function(c){ return all[c]; });
  }
  function importFromExcel(file){
    loadXLSX().then(function(XLSX){
      var r=new FileReader();
      r.onload=function(){
        try{
          var wb = XLSX.read(new Uint8Array(r.result), { type:'array' });
          var recs = parseWorkbook(XLSX, wb);
          if(!recs.length){ window.alert('無法從此 Excel 辨識出場站資料。\n請確認檔案含有場站代碼與 CUSS／SBD／SBG 欄位，或改用匯出的 JSON／CSV 匯入。'); return; }
          applyImport(recs, 'merge', 'Excel（'+file.name+'）');
        }catch(err){ window.alert('Excel 解析失敗：'+(err&&err.message||err)); }
      };
      r.onerror=function(){ window.alert('讀取 Excel 檔案失敗。'); };
      r.readAsArrayBuffer(file);
    }).catch(function(){ window.alert('無法載入 Excel 解析元件（需連線）。\n離線時請改用匯出的 JSON／CSV 匯入。'); });
  }
  // apply parsed records — replace (full JSON/CSV) or merge-by-code (partial Excel)
  function applyImport(recs, mode, srcLabel){
    if(!recs || !recs.length){ window.alert('未從 '+srcLabel+' 解析到任何場站資料。'); return; }
    var msg = mode==='replace'
      ? '已從 '+srcLabel+' 解析 '+recs.length+' 個場站。\n\n要「取代」目前 '+state.stations.length+' 個場站嗎？（現有資料將被覆蓋，可用「重設」還原原始資料庫）'
      : '已從 '+srcLabel+' 解析 '+recs.length+' 個場站。\n\n要「合併更新」至目前資料嗎？（相同場站代碼更新其欄位，新代碼則新增）';
    if(!window.confirm(msg)) return;
    var stations, added=0, updated=0;
    if(mode==='replace'){
      nid=1;
      stations = recs.map(function(r){ var o=normalize(r); o.id=nid++; return o; });
    }else{
      stations = state.stations.map(function(s){ var n={}; for(var k in s) n[k]=s[k]; return n; });
      var idxByCode={}; stations.forEach(function(s,i){ idxByCode[s.code]=i; });
      var maxId=stations.reduce(function(m,s){ return Math.max(m, s.id||0); }, 0); nid=maxId+1;
      recs.forEach(function(r){
        if(idxByCode[r.code]!=null){
          var tgt=stations[idxByCode[r.code]];
          for(var k in r){ if(k==='code') continue; var v=r[k]; if(v==null||v==='') continue; tgt[k]=v; }
          var nn=normalize(tgt); nn.id=tgt.id; stations[idxByCode[r.code]]=nn; updated++;
        }else{
          var o=normalize(r); o.id=nid++; stations.push(o); idxByCode[o.code]=stations.length-1; added++;
        }
      });
    }
    save(stations); state.stations=stations; state.selectedId=null;
    state.filters={ region:'all', cuss:'all', sbd:'all', sbg:'all', kpi:'all', excluded:{} };
    state.pickerOpen=false;
    logEvent('匯入資料（'+srcLabel+'）：'+(mode==='replace'?('取代為 '+stations.length+' 站'):('更新 '+updated+' 站、新增 '+added+' 站，共 '+stations.length+' 站')));
    render();
    window.alert('匯入完成：目前共 '+stations.length+' 個場站'+(mode==='merge'?('（更新 '+updated+'、新增 '+added+'）'):'')+'。');
  }
  function importData(){
    var inp=document.createElement('input');
    inp.type='file';
    inp.accept='.json,.csv,.xlsx,.xls,application/json,text/csv';
    inp.onchange=function(){
      var f=inp.files && inp.files[0]; if(!f) return;
      var name=(f.name||'').toLowerCase();
      if(/\.json$/.test(name)) readTextFile(f, importFromJSONText);
      else if(/\.csv$/.test(name)) readTextFile(f, importFromCSVText);
      else if(/\.(xlsx|xlsm|xls)$/.test(name)) importFromExcel(f);
      else window.alert('不支援的檔案格式。\n請選擇 JSON、CSV 或 Excel（.xlsx／.xls）。');
    };
    inp.click();
  }

  var _h2c = null;
  function loadH2C(){
    if(window.html2canvas) return Promise.resolve(window.html2canvas);
    if(_h2c) return _h2c;
    _h2c = new Promise(function(res, rej){
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = function(){ res(window.html2canvas); };
      s.onerror = function(){ rej(new Error('load failed')); };
      document.head.appendChild(s);
    });
    return _h2c;
  }
  function exportPNG(targetId, filename){
    var el = document.getElementById(targetId || 'cuss-board');
    if(!el) return;
    // higher-resolution export: target ~4× device pixels, but cap the scale so the
    // output stays within the browser's max canvas dimension (~16384px).
    var rect = el.getBoundingClientRect();
    var MAX_DIM = 16384;
    var want = Math.max(4, Math.ceil((window.devicePixelRatio || 1) * 2));
    var fit = Math.floor(MAX_DIM / Math.max(rect.width || 1, rect.height || 1));
    var scale = Math.max(2, Math.min(want, fit || want));
    loadH2C().then(function(h2c){
      return h2c(el, { scale:scale, backgroundColor:'#ffffff', useCORS:true, logging:false,
                       ignoreElements:function(node){ return node.getAttribute && node.getAttribute('data-noshot')==='1'; } }).then(function(canvas){
        canvas.toBlob(function(b){ if(b) download(filename || '自助化設備儀表板.png', b); }, 'image/png');
      });
    }).catch(function(){
      window.alert('圖片匯出失敗（可能無法連線載入匯出元件），請改用匯出 JSON／CSV 功能。');
    });
  }

  // ---- derive coverage ----
  function countBy(list, f){
    var c = {online:0,paused:0,building:0,evaluating:0,none:0};
    list.forEach(function(s){ if(c[s[f]]!=null) c[s[f]]++; });
    return c;
  }
  function stage(list, n, code, desc, f){
    var total = list.length || 1;
    var c = countBy(list, f);
    var pct = Math.round((c.online/total)*100);
    var segs = ORDER.filter(function(k){ return c[k]>0; }).map(function(k){
      var w = (c[k]/total)*100;
      return { w:+w.toFixed(2), color:STATUS[k].color, textOn:STATUS[k].textOn, label: w>=6 ? String(c[k]) : '' };
    });
    var legend = ORDER.map(function(k){ return { color:STATUS[k].color, mark:STATUS[k].mark, text:c[k], label:STATUS[k].label }; });
    var onlineList = list.filter(function(s){ return s[f]==='online'; });
    return { n:n, code:code, desc:desc, pctLabel: pct+'%', online:c.online, segs:segs, legend:legend, onlineList:onlineList };
  }

  var phaseDot = {
    '2025前':STATUS.online.color, '2026/Q1':STATUS.online.color, '2026/Q2':STATUS.online.color,
    '2026/Q3':STATUS.building.color, '2026/Q4':STATUS.building.color, '暫定2027':STATUS.evaluating.color,
    '未排程':STATUS.none.color
  };

  // ---- scoring for map & matrix ----
  // ---- CUSS/SBD/SBG online-combination categories (inclusive) ----
  // a station counts toward a combo if ALL listed stages are 已上線 (online),
  // regardless of the others — e.g. CUSS＋SBD also includes all-three stations
  var COMBOS = [
    { key:'all',  label:'CUSS｜SBD｜SBG皆已上線', title:'CUSS+SBD+SBG', sdesc:'三項自助皆已上線', req:['cuss','sbd','sbg'] },
    { key:'cs',   label:'CUSS＋SBD',    title:'CUSS+SBD', sdesc:'CUSS 與 SBD 皆已上線', req:['cuss','sbd'] },
    { key:'cg',   label:'僅CUSS＋SBG',  title:'僅CUSS+SBG', sdesc:'僅 CUSS 與 SBG 已上線（未含 SBD）', req:['cuss','sbg'], not:['sbd'] },
    { key:'sg',   label:'SBD＋SBG',     title:'SBD+SBG', sdesc:'SBD 與 SBG 皆已上線', req:['sbd','sbg'] },
    { key:'c',    label:'CUSS',         title:'CUSS', sdesc:'CUSS 已上線', req:['cuss'] },
    { key:'s',    label:'SBD',          title:'SBD', sdesc:'SBD 已上線', req:['sbd'] },
    { key:'g',    label:'SBG',          title:'SBG', sdesc:'SBG 已上線', req:['sbg'] },
    { key:'none', label:'CUSS｜SBD｜SBG皆未上線', title:'皆未上線', sdesc:'三項自助皆未上線', req:[] }
  ];
  function comboMatch(s, combo){
    if(combo.key==='none') return s.cuss!=='online' && s.sbd!=='online' && s.sbg!=='online';
    // req stages must be online; any `not` stages must NOT be online (exclusive/「僅」)
    var reqOk = combo.req.every(function(st){ return s[st]==='online'; });
    var notOk = (combo.not||[]).every(function(st){ return s[st]!=='online'; });
    return reqOk && notOk;
  }
  function comboCounts(){
    var c = {}; COMBOS.forEach(function(o){ c[o.key]=0; });
    state.stations.forEach(function(s){ COMBOS.forEach(function(o){ if(comboMatch(s,o)) c[o.key]++; }); });
    return c;
  }

  var STATUS_WEIGHT = { online:1, paused:0.55, building:0.45, evaluating:0.2, none:0 };
  // CUSS/SBD weighted higher than SBG (sums to 1 so the score stays 0–1)
  var STAGE_WEIGHT = { cuss:0.45, sbd:0.45, sbg:0.10 };
  function automationScore(s){
    return STATUS_WEIGHT[s.cuss]*STAGE_WEIGHT.cuss + STATUS_WEIGHT[s.sbd]*STAGE_WEIGHT.sbd + STATUS_WEIGHT[s.sbg]*STAGE_WEIGHT.sbg;
  }
  // log-scale volume normalized to the pax range of a given station set (so the
  // matrix axis rescales to whatever is currently visible/filtered).
  function paxRange(list){
    var lo = Infinity, hi = -Infinity;
    (list||[]).forEach(function(s){ var v = Math.log(Math.max(1, +s.pax||0)); if(v<lo) lo=v; if(v>hi) hi=v; });
    if(!isFinite(lo)){ lo = Math.log(500); hi = Math.log(250000); }
    return { lo:lo, hi:hi };
  }
  function volumeScoreIn(s, range){
    var v = Math.log(Math.max(1, +s.pax||0));
    if(range.hi - range.lo < 1e-9) return 0.5;
    return Math.max(0, Math.min(1, (v - range.lo) / (range.hi - range.lo)));
  }
  function volumeScore(s){ return volumeScoreIn(s, paxRange(state.stations)); }
  var AUTO_THRESHOLD = 0.5, VOL_THRESHOLD = 0.5;
  // quadrants keyed by (hiVol, hiAuto)
  var QUAD = {
    matureLow:  { name:'成熟場站',   color:'#00853C', tint:'#EAF3EE', desc:'設備完整，可作為服務 2.0 示範站', icon:'bars' },
    priority:   { name:'重點場站', color:'#EE7623', tint:'#FCEEE2', desc:'航班量大、旅客量大、櫃台壓力高，將持續最佳化旅客流程', icon:'star' },
    limited:    { name:'限制型場站', color:'#C79A2E', tint:'#F7F1E0', desc:'受限機場設施、空間或 GHA 作業模式', icon:'warn' },
    progress:   { name:'進行中場站', color:'#3F9E86', tint:'#E6F1EE', desc:'已有部分自助功能，仍需補足行李、證件或付款流程', icon:'refresh' }
  };
  function quadrantOf(s){
    var hiV = volumeScore(s) >= VOL_THRESHOLD;
    var hiA = automationScore(s) >= AUTO_THRESHOLD;
    if(hiA && !hiV) return QUAD.matureLow;
    if(hiA && hiV)  return QUAD.priority;
    if(!hiA && !hiV) return QUAD.limited;
    return QUAD.progress;
  }

  // a coverage card for one selected CUSS/SBD/SBG online-combination.

  // priority tier (1 = leftmost / highest):
  //  1 CUSS｜SBD｜SBG完備 + CUSS 列印行李條   2 CUSS+SBD 完備 + CUSS 列印行李條
  //  3 CUSS｜SBD｜SBG完備                     4 CUSS/SBD 完備      5 其餘（原始規則）
  function tierRank(s){
    var allThree = s.cuss==='online' && s.sbd==='online' && s.sbg==='online';
    var cussSbd  = s.cuss==='online' && s.sbd==='online';
    var bag = !!s.bagTag;
    if(allThree && bag) return 1;
    if(cussSbd && bag)  return 2;
    if(allThree)        return 3;
    if(cussSbd)         return 4;
    return 5;
  }
  // order chips left→right: priority tier first, then the original rule
  // (automation completeness high→low, then CUSS status, then code)
  function byAutomation(a, b){
    var t = tierRank(a) - tierRank(b);
    if(t) return t;
    var d = automationScore(b) - automationScore(a);
    if(Math.abs(d) > 1e-9) return d;
    var c = STATUS_WEIGHT[b.cuss] - STATUS_WEIGHT[a.cuss];
    if(c) return c;
    return (a.code||'').localeCompare(b.code||'');
  }
  function phaseIndex(s){ var i = PHASES.indexOf(s.phase); return i<0 ? PHASES.length : i; }
  // region view: order by build schedule first, then the completeness tier rule
  function byPhaseThenAuto(a, b){
    var d = phaseIndex(a) - phaseIndex(b);
    if(d) return d;
    return byAutomation(a, b);
  }
  function groupList(){
    var pool = state.stations;
    if(state.groupMode==='region'){
      var regs = REGION_ORDER.filter(function(r){ return pool.some(function(s){ return s.region===r; }); });
      pool.forEach(function(s){ if(s.region && regs.indexOf(s.region)<0) regs.push(s.region); });
      // stations with empty region
      if(pool.some(function(s){ return !s.region; })) regs.push('');
      return regs.map(function(r){
        return { name: r || '未分區', dot:'#00853C', items: pool.filter(function(s){ return (s.region||'')===r; }).sort(byPhaseThenAuto) };
      });
    }
    return PHASES.map(function(p){
      return { name:p, dot:phaseDot[p]||STATUS.evaluating.color, items: pool.filter(function(s){ return s.phase===p; }).sort(byAutomation) };
    });
  }

      + '<span style="position:absolute;top:2px;left:'+knobX+';width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.28);transition:left .15s;pointer-events:none"></span>'
      + '</button>';
  }

  // ---- map ----
  var MW = 1000, MH = 500;
  function mproj(lat, lon){ return { x:(lon+180)/360*MW, y:(90-lat)/180*MH }; }
  // continent -> our-region membership for choropleth (based on station.region groups)
  var CONT_LABEL = {
    'North America':'美洲','South America':'南美','Europe':'歐洲','Africa':'非洲','Asia':'亞洲','Oceania':'大洋洲'
  };
  var CONT_COLOR = {
    'North America':'#7FB3D5','South America':'#F5B041','Europe':'#82C4A6','Africa':'#E59866','Asia':'#C39BD3','Oceania':'#76D7C4'
  };
  function coverageByContinent(list){
    // % of stations online (cuss) per continent, mapped from station.region
    var regionToCont = {'美洲':'North America','歐洲':'Europe','東南亞':'Asia','東北亞':'Asia','大陸':'Asia','港澳':'Asia','台灣區':'Asia','紐澳':'Oceania'};
    var agg = {};
    (list||state.stations).forEach(function(s){
      var c = regionToCont[s.region]; if(!c) return;
      agg[c] = agg[c] || {on:0, tot:0};
      agg[c].tot++; if(s.cuss==='online') agg[c].on++;
    });
    return agg;
  }
  function continentFill(cont, list){
    if(state.mapTheme==='dark'){
      if(state.mapPalette==='region') return CONT_COLOR[cont] ? shade(CONT_COLOR[cont], -0.35) : '#2A3338';
      if(state.mapPalette==='mono') return '#3A454B';
    }
    if(state.mapPalette==='mono') return '#D7DCDE';
    if(state.mapPalette==='brand') return '#CDE4D7';
    if(state.mapPalette==='coverage'){
      var agg = coverageByContinent(list)[cont];
      var r = agg && agg.tot ? agg.on/agg.tot : 0;
      // green ramp
      return mix('#EAF1EE', '#00853C', r);
    }
    return CONT_COLOR[cont] || '#D7DCDE'; // region
  }
  function hexToRgb(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  function rgbToHex(a){ return '#'+a.map(function(v){ v=Math.max(0,Math.min(255,Math.round(v))); return (v<16?'0':'')+v.toString(16); }).join(''); }
  function mix(a,b,t){ var A=hexToRgb(a),B=hexToRgb(b); return rgbToHex([A[0]+(B[0]-A[0])*t,A[1]+(B[1]-A[1])*t,A[2]+(B[2]-A[2])*t]); }
  function shade(a,t){ return t<0 ? mix(a,'#000000',-t) : mix(a,'#ffffff',t); }

  function dotFill(s){
    if(state.dotColor==='region'){
      var rc = {'美洲':'#3E7CB1','歐洲':'#2E8B57','東南亞':'#E8A400','東北亞':'#C0392B','大陸':'#8E44AD','港澳':'#16A085','台灣區':'#00853C','紐澳':'#D35400'};
      return rc[s.region] || '#6E787B';
    }
    return STATUS[s.cuss].color; // cuss status
  }
  function baseDotRadius(s){ return 3.2 + Math.log(Math.max(1,+s.pax||0)) * 0.72; }

  // Spread overlapping map dots apart (collision resolution) with a spring back
  // to each dot's true geographic point — dense regions fan out, isolated dots
  // stay put, and nothing overlaps.
  function spreadDots(items){
    var N=items.length, pad=1.0, i, j, k, a, b, dx, dy, d, min, push, ux, uy;
    // phase 1: collide + weak spring to home (positions dots near geography)
    for(var it=0; it<110; it++){
      for(i=0;i<N;i++)for(j=i+1;j<N;j++){
        a=items[i]; b=items[j];
        dx=a.x-b.x; dy=a.y-b.y; d=Math.sqrt(dx*dx+dy*dy)||0.01; min=a.R+b.R+pad;
        if(d<min){ push=(min-d)/2; ux=dx/d; uy=dy/d; a.x+=ux*push; a.y+=uy*push; b.x-=ux*push; b.y-=uy*push; }
      }
      for(k=0;k<N;k++){ a=items[k]; a.x+=(a.tx-a.x)*0.05; a.y+=(a.ty-a.y)*0.05; }
    }
    // phase 2: collision-only until settled — guarantees no overlap
    for(it=0; it<60; it++){
      var moved=false;
      for(i=0;i<N;i++)for(j=i+1;j<N;j++){
        a=items[i]; b=items[j];
        dx=a.x-b.x; dy=a.y-b.y; d=Math.sqrt(dx*dx+dy*dy)||0.01; min=a.R+b.R+pad;
        if(d<min){ push=(min-d)/2+0.02; ux=dx/d; uy=dy/d; a.x+=ux*push; a.y+=uy*push; b.x-=ux*push; b.y-=uy*push; moved=true; }
      }
      if(!moved) break;
    }
    for(k=0;k<N;k++){ a=items[k];
      a.x=Math.max(a.R, Math.min(1000-a.R, a.x));
      a.y=Math.max(12+a.R, Math.min(420-a.R, a.y));
    }
  }

  // Nudge overlapping labels apart (box separation) with a weak spring back to
  // each dot, so uncrowded labels stay put and crowded ones fan out.
  function layoutLabels(items){
    var N = items.length, i, j, it;
    for(it=0; it<70; it++){
      for(i=0;i<N;i++){
        for(j=i+1;j<N;j++){
          var a=items[i], b=items[j];
          var dx=a.lx-b.lx, dy=a.ly-b.ly;
          var ox=(a.w+b.w)/2 + 1.4 - Math.abs(dx);
          var oy=(a.h+b.h)/2 + 1.0 - Math.abs(dy);
          if(ox>0 && oy>0){
            if(ox<oy){ var s1=(dx===0?(i&1?1:-1):(dx>0?1:-1))*ox*0.5; a.lx+=s1; b.lx-=s1; }
            else     { var s2=(dy===0?(i&1?1:-1):(dy>0?1:-1))*oy*0.5; a.ly+=s2; b.ly-=s2; }
          }
        }
      }
      for(i=0;i<N;i++){ it=items[i]; it.lx += (it.hx-it.lx)*0.05; it.ly += (it.hy-it.ly)*0.05; }
    }
  }

  function mapSVGHTML(){
    var visible = filteredStations();
    var ocean = state.mapTheme==='dark' ? '#161E22' : '#EAF1F4';
    var stroke = state.mapTheme==='dark' ? '#0E1417' : '#FFFFFF';
    var dotStroke = state.mapTheme==='dark' ? '#0E1417' : '#fff';
    var leadStroke = state.mapTheme==='dark' ? '#6C7A72' : '#8A968F';
    var sc = state.dotScale;
    var names = state.showNames;
    var twoTone = state.dotColor==='cuss';
    var cussFrac = names ? 0.70 : 0.56;   // CUSS (top) always the larger share; more room for the label when names show
    var land = MAPCONT.map(function(c){
      return '<path d="'+c.p+'" fill="'+continentFill(c.c, visible)+'" stroke="'+stroke+'" stroke-width="0.6"/>';
    }).join('');
    // build dot list, then spread apart so nothing overlaps (kept near true geo)
    var pool = visible.filter(function(s){ return GEO[s.code]||(s.lat!=null); }).map(function(s){
      var p = mproj(GEO[s.code].lat, GEO[s.code].lon);
      var R = baseDotRadius(s) * sc;
      return { s:s, tx:p.x, ty:p.y, x:p.x, y:p.y, R:R };
    });
    spreadDots(pool);
    // draw smaller (lower pax) dots first, big hubs on top
    pool.sort(function(a,b){ return (a.s.pax||0)-(b.s.pax||0); });
    // label font in world units scales with zoom so on-screen size stays ~constant
    // → zooming into a dense cluster genuinely de-crowds the labels
    var vbNow = state.mapVB;
    var labelFS = Math.max(2.6, Math.min(16, 9.5 * (vbNow.w / BASE_VB.w))) * (state.mapNameScale||1);
    var defs = '', dots = '', labelItems = [];
    pool.forEach(function(m){
      var s = m.s;
      var cx = +m.x.toFixed(1), cy = +m.y.toFixed(1);
      var R = +m.R.toFixed(1);
      var body;
      if(twoTone){
        var cid = 'dc'+s.id;
        var xL = (cx-R).toFixed(1), yT = (cy-R).toFixed(1), W = (2*R).toFixed(1), FULL = (2*R).toFixed(1);
        // full SBD base, then CUSS overlay on top — avoids the antialiased seam
        // a pair of adjacent rects would leave at the split
        var topH = (2*R*cussFrac).toFixed(1);
        defs += '<clipPath id="'+cid+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+R+'"/></clipPath>';
        body = '<g clip-path="url(#'+cid+')">'
          + '<rect x="'+xL+'" y="'+yT+'" width="'+W+'" height="'+FULL+'" fill="'+STATUS[s.sbd].color+'"/>'
          + '<rect x="'+xL+'" y="'+yT+'" width="'+W+'" height="'+topH+'" fill="'+STATUS[s.cuss].color+'"/>'
          + '</g>'
          + '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="'+dotStroke+'" stroke-width="0.9"/>';
      } else {
        body = '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="'+dotFill(s)+'" fill-opacity="0.92" stroke="'+dotStroke+'" stroke-width="0.9"/>';
      }
      var selRing = s.id===state.selectedId ? '<circle cx="'+cx+'" cy="'+cy+'" r="'+(R+3.5).toFixed(1)+'" fill="none" stroke="#00853C" stroke-width="1.6"/>' : '';
      var kpiRing = (s.kpi && state.showKpiRing) ? '<circle cx="'+cx+'" cy="'+cy+'" r="'+(R+2).toFixed(1)+'" fill="none" stroke="#fff" stroke-width="1.3"/>' : '';
      dots += '<g data-tip="'+s.id+'" data-action="select" data-id="'+s.id+'" style="cursor:pointer">'+selRing+body+kpiRing+'</g>';
      if(names){
        var hy = twoTone ? (cy - R + R*cussFrac) : cy;   // home = on the dot (CUSS band)
        labelItems.push({ s:s, cx:cx, cy:cy, fs:labelFS, hx:cx, hy:hy, lx:cx, ly:hy,
                          w: s.code.length*labelFS*0.62, h: labelFS });
      }
    });
    // de-collide labels and draw leader lines for the ones that got pulled out
    var leaders = '', labels = '';
    if(names && labelItems.length){
      layoutLabels(labelItems);
      labelItems.forEach(function(m){
        var moved = Math.abs(m.lx-m.hx) + Math.abs(m.ly-m.hy) > 1.6;
        if(moved){
          leaders += '<line x1="'+m.cx.toFixed(1)+'" y1="'+m.cy.toFixed(1)+'" x2="'+m.lx.toFixed(1)+'" y2="'+m.ly.toFixed(1)+'" stroke="'+leadStroke+'" stroke-width="0.55" stroke-opacity="0.85"/>'
            + '<circle cx="'+m.lx.toFixed(1)+'" cy="'+m.ly.toFixed(1)+'" r="0.9" fill="'+leadStroke+'"/>';
        }
        var by = (m.ly + m.fs*0.34).toFixed(1);
        labels += '<text x="'+m.lx.toFixed(1)+'" y="'+by+'" text-anchor="middle" font-size="'+m.fs.toFixed(1)+'" font-weight="800" font-family="system-ui,sans-serif" fill="#fff" stroke="rgba(18,26,22,.62)" stroke-width="'+(m.fs*0.2).toFixed(2)+'" paint-order="stroke" style="pointer-events:none">'+esc(m.s.code)+'</text>';
      });
    }
    var vb = state.mapVB;
    return '<svg id="worldmap" viewBox="'+vb.x+' '+vb.y+' '+vb.w+' '+vb.h+'" preserveAspectRatio="xMidYMid meet" width="100%" style="display:block;background:'+ocean+';border-radius:10px;touch-action:none;cursor:grab" xmlns="http://www.w3.org/2000/svg">'
      + '<defs>'+defs+'</defs>' + land + leaders + dots + labels + '</svg>';
  }

  // ---- matrix ----
  function quadIcon(kind, color, size, sw){

    var s = 'fill="none" stroke="'+color+'" stroke-width="'+(sw||1.8)+'" stroke-linecap="round" stroke-linejoin="round"';
    var o = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24">';
    if(kind==='bars') return o+'<path d="M4 20V10M10 20V4M16 20v-7M22 20H2" '+s+'/></svg>';
    if(kind==='star') return o+'<path d="M12 3l2.6 5.6 6 .8-4.4 4.2 1.1 6-5.3-2.9L6.7 19.6l1.1-6L3.4 9.4l6-.8z" fill="'+color+'" stroke="'+color+'" stroke-width="1"/></svg>';

    if(kind==='refresh') return o+'<path d="M20 12a8 8 0 1 1-2.3-5.6M20 4v4h-4" '+s+'/></svg>';

  function quadCard(q){

        }).join('')

  // Snap matrix dots onto a tidy grid: each dot takes the free cell nearest its
  // ideal (volume, automation) position, so dots never overlap yet stay ordered.
  function gridSnapMatrix(items){
    var COLS=14, ROWS=12, MX=4, SPAN=92, occ={};
    items.sort(function(a,b){ return (b.s.pax||0)-(a.s.pax||0); });   // hubs claim their cell first
    items.forEach(function(m){
      var c0=Math.round(m.fx*(COLS-1)), r0=Math.round((1-m.fy)*(ROWS-1)), best=null;
      for(var rad=0; rad<COLS+ROWS && !best; rad++){
        var bd=Infinity, bc=null;
        for(var dc=-rad;dc<=rad;dc++)for(var dr=-rad;dr<=rad;dr++){
          if(Math.max(Math.abs(dc),Math.abs(dr))!==rad) continue;
          var c=c0+dc, r=r0+dr;
          if(c<0||c>=COLS||r<0||r>=ROWS||occ[c+'_'+r]) continue;
          var dd=dc*dc*1.15+dr*dr;   // slight horizontal-spread preference
          if(dd<bd){ bd=dd; bc={c:c,r:r}; }
        }
        if(bc) best=bc;
      }
      if(!best) best={c:c0,r:r0};
      occ[best.c+'_'+best.r]=1;
      m.left = MX + (best.c+0.5)/COLS*SPAN;
      m.top  = MX + (best.r+0.5)/ROWS*SPAN;
    });
  }
  function matrixHTML(){
    var visible = filteredStations();
    var range = paxRange(visible);   // rescale X axis to the currently-visible stations
    // snap dots to a tidy grid by their (volume, automation) position so they
    // never overlap — position stays meaningful, arrangement stays neat
    var gitems = visible.map(function(s){ return { s:s, fx:volumeScoreIn(s,range), fy:automationScore(s) }; });
    gridSnapMatrix(gitems);
    var pts = gitems.map(function(m){ return { left:m.left, top:m.top }; });
    var dots = gitems.map(function(m){
      var s = m.s;
      var r = 12, cf = 60;   // dot split: CUSS top 60%, SBD bottom 40%
      var bg = 'linear-gradient(to bottom,'+STATUS[s.cuss].color+' 0,'+STATUS[s.cuss].color+' '+cf+'%,'+STATUS[s.sbd].color+' '+cf+'%,'+STATUS[s.sbd].color+' 100%)';
      var ring = (s.kpi && state.showKpiRing) ? 'box-shadow:0 0 0 2px #fff,0 0 0 3.5px '+STATUS[s.cuss].color : '0 1px 2px rgba(0,0,0,.2)';
      var selO = s.id===state.selectedId ? ';outline:2px solid #00853C;outline-offset:1px' : '';
      return '<div data-tip="'+s.id+'" data-action="select" data-id="'+s.id+'" title="'+esc(s.code)+'" '
        + 'style="position:absolute;left:'+m.left.toFixed(2)+'%;top:'+m.top.toFixed(2)+'%;transform:translate(-50%,-50%);width:'+r*2+'px;height:'+r*2+'px;border-radius:50%;background:'+bg+';color:'+STATUS[s.cuss].textOn+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;cursor:pointer;border:1.5px solid #fff;'+(s.kpi?ring:'box-shadow:0 1px 2px rgba(0,0,0,.2)')+selO+'">'+esc(s.code)+'</div>';
    }).join('');

    // large faint watermark icon centred in each quadrant (behind the dots)
    var wmCenter = { matureLow:[27,27], priority:[73,27], limited:[27,73], progress:[73,73] };

      + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'
      +   '<div><div style="font-size:16px;font-weight:900;color:#141819">場站策略定位矩陣</div>'
      +   '<div style="font-size:11px;color:#6E787B;margin-top:2px">依自動化完備度（CUSS／SBD／SBG）與旅客量／航班量分類；圓點上半＝CUSS／下半＝SBD、白圈＝KPI　·　顯示 '+visible.length+' 站</div></div>'
      +   '<button data-action="exportPNG" data-target="matrix-export" data-file="場站定位矩陣.png" data-noshot="1" style="flex:none;border:1.5px solid #C7CDCF;background:#fff;color:#141819;border-radius:16px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer">匯出矩陣圖片</button>'

      +     '<span style="font-size:11px;color:#8A938F">高</span>'
      +     '<span style="writing-mode:vertical-rl;font-size:12px;font-weight:700;color:#515A5D;margin:8px 0;letter-spacing:2px">自動化完備度</span>'
      +     '<span style="font-size:11px;color:#8A938F">低</span>'
      +   '</div>'
      +   '<div style="flex:1;display:flex;flex-direction:column">'
      +     '<div style="position:relative;flex:1;border:1px solid #E4EBE6;border-radius:12px;overflow:hidden">'
      +       '<div style="position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;padding:8px">'

      +   '</div>'
      + '</div>'
      + quadLegendHTML()

  function filterSelect(field, label, opts){
    var cur = state.filters[field];
    var options = opts.map(function(o){ return '<option value="'+o.v+'"'+(cur===o.v?' selected':'')+'>'+esc(o.label)+'</option>'; }).join('');
    return '<label style="display:flex;align-items:center;gap:6px;flex:none">'
      + '<span style="font-size:11px;font-weight:700;color:#515A5D;white-space:nowrap">'+label+'</span>'
      + '<select data-filter="'+field+'" style="border:1px solid '+(cur!=='all'?'#00853C':'#DFE3E4')+';border-radius:8px;padding:6px 9px;font-size:12px;font-family:inherit;background:#fff;color:'+(cur!=='all'?'#00853C':'#141819')+';font-weight:'+(cur!=='all'?'700':'400')+';cursor:pointer">'+options+'</select>'
      + '</label>';
  }
  // map view / zoom / dot-size / station-name-size controls — placed in the
  // blank space to the right of the filter row.
  function mapMoveControls(){
    return '<div style="display:flex;flex-wrap:nowrap;align-items:center;gap:10px;margin-left:auto;flex:none">'
      +   '<div style="display:flex;align-items:center;gap:5px;flex:none"><span style="font-size:11px;font-weight:700;color:#515A5D;white-space:nowrap">縮放</span>'
      +     '<button data-action="zoomMap" data-k="0.8" style="width:26px;height:26px;border:1px solid #DFE3E4;background:#fff;color:#141819;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;line-height:1">＋</button>'
      +     '<button data-action="zoomMap" data-k="1.25" style="width:26px;height:26px;border:1px solid #DFE3E4;background:#fff;color:#141819;border-radius:8px;font-size:17px;font-weight:700;cursor:pointer;line-height:1">－</button>'
      +     '<button data-action="resetMapView" style="border:1px solid #DFE3E4;background:#fff;color:#515A5D;border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">重置視圖</button>'
      +   '</div>'
      +   '<div style="display:flex;align-items:center;gap:6px;flex:none"><span style="font-size:11px;font-weight:700;color:#515A5D;white-space:nowrap">圓圈大小</span>'
      +     '<input type="range" min="0.4" max="2.6" step="0.1" value="'+state.dotScale+'" data-dotsize style="width:78px;accent-color:#00853C;cursor:pointer" />'
      +     '<span style="font-size:11px;color:#8A938F;min-width:30px">'+Math.round(state.dotScale*100)+'%</span>'
      +   '</div>'
      +   '<div style="display:flex;align-items:center;gap:6px;flex:none"><span style="font-size:11px;font-weight:700;color:#515A5D;white-space:nowrap">場站名稱字級</span>'
      +     '<input type="range" min="0.6" max="2.4" step="0.1" value="'+state.mapNameScale+'" data-mapnamesize style="width:78px;accent-color:#00853C;cursor:pointer" />'
      +     '<span style="font-size:11px;color:#8A938F;min-width:30px">'+Math.round(state.mapNameScale*100)+'%</span>'
      +   '</div>'
      +   '<button data-action="resetMapDefaults" title="將地圖縮放、圓圈大小與場站名稱字級恢復為預設" style="border:1px solid #DFE3E4;background:#fff;color:#00853C;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">恢復預設</button>'
      + '</div>';
  }
  function filterBarHTML(){
    var statusOpts = [{v:'all',label:'全部'}].concat(ORDER.map(function(k){ return {v:k, label:STATUS[k].mark+' '+STATUS[k].label}; }));
    var regions = REGION_ORDER.filter(function(r){ return state.stations.some(function(s){ return s.region===r; }); });
    state.stations.forEach(function(s){ if(s.region && regions.indexOf(s.region)<0) regions.push(s.region); });
    var regionOpts = [{v:'all',label:'全部區域'}].concat(regions.map(function(r){ return {v:r, label:r}; }));
    var kpiOpts = [{v:'all',label:'全部'},{v:'yes',label:'僅 KPI 場站'},{v:'no',label:'非 KPI'}];
    var clrOn = filtersActive();
    var clearBtn = '<button data-action="clearFilters"'+(clrOn?'':' disabled')+' style="flex:none;white-space:nowrap;border:1px solid '+(clrOn?'#DFE3E4':'#ECEFEF')+';background:#fff;color:'+(clrOn?'#C24626':'#C7CDCF')+';border-radius:14px;padding:5px 12px;font-size:12px;font-weight:600;cursor:'+(clrOn?'pointer':'default')+'">清除篩選</button>';
    var exN = excludedCount();
    var pickerBtn = '<button data-action="togglePicker" style="flex:none;white-space:nowrap;border:1px solid '+(state.pickerOpen||exN>0?'#00853C':'#DFE3E4')+';background:'+(state.pickerOpen?'#00853C':'#fff')+';color:'+(state.pickerOpen?'#fff':(exN>0?'#00853C':'#515A5D'))+';border-radius:14px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer">個別場站'+(exN>0?'（已排除 '+exN+'）':'')+' '+(state.pickerOpen?'▲':'▾')+'</button>';
    return '<div style="display:flex;flex-wrap:nowrap;align-items:center;gap:10px;background:#fff;border:1px solid #DFE3E4;border-radius:12px;padding:12px 16px;margin-bottom:14px;overflow-x:auto">'
      + '<span style="flex:none;font-size:12px;font-weight:800;color:#00853C">篩選</span>'
      + filterSelect('region','場站區域',regionOpts)
      + filterSelect('cuss','CUSS',statusOpts)
      + filterSelect('sbd','SBD',statusOpts)
      + filterSelect('sbg','SBG',statusOpts)
      + filterSelect('kpi','經理人 KPI',kpiOpts)
      + pickerBtn
      + clearBtn
      + mapMoveControls()
      + '</div>';
  }
  function pickerHTML(){
    if(!state.pickerOpen) return '';
    var e = state.filters.excluded;
    var regions = REGION_ORDER.filter(function(r){ return state.stations.some(function(s){ return s.region===r; }); });
    state.stations.forEach(function(s){ if(s.region && regions.indexOf(s.region)<0) regions.push(s.region); });
    if(state.stations.some(function(s){ return !s.region; })) regions.push('');
    var groups = regions.map(function(r){
      var items = state.stations.filter(function(s){ return (s.region||'')===r; });
      if(!items.length) return '';
      var chips = items.map(function(s){
        var off = !!e[s.id];
        return '<button data-action="toggleExclude" data-id="'+s.id+'" title="'+esc(s.code)+(off?'（已排除）':'')+'" style="border:1.5px solid '+(off?'#E0E4E5':STATUS[s.cuss].color)+';background:'+(off?'#F2F4F4':'#fff')+';color:'+(off?'#AEB6B8':'#141819')+';border-radius:7px;padding:4px 9px;font-size:11.5px;font-weight:700;letter-spacing:.5px;cursor:pointer;'+(off?'text-decoration:line-through':'')+'"><span style="display:inline-block;width:7px;height:7px;border-radius:2px;background:'+(off?'#CDD3D4':STATUS[s.cuss].color)+';margin-right:5px;vertical-align:middle"></span>'+esc(s.code)+'</button>';
      }).join('');
      return '<div style="display:flex;flex-direction:column;gap:6px;min-width:0">'
        + '<div style="font-size:11px;font-weight:700;color:#6E787B">'+esc(r||'未分區')+'</div>'
        + '<div style="display:flex;flex-wrap:wrap;gap:6px">'+chips+'</div>'
        + '</div>';
    }).join('');
    return '<div id="station-picker" style="background:#fff;border:1px solid #DFE3E4;border-radius:12px;padding:14px 16px;margin-bottom:14px">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px">'
      +   '<div style="font-size:12px;font-weight:800;color:#00853C">個別場站選取<span style="font-weight:400;color:#8A938F">　點場站代碼可加入／移除；灰色刪除線＝已排除，不納入地圖與矩陣　·　點空白處收合</span></div>'
      +   '<div style="display:flex;gap:6px">'
      +     '<button data-action="pickAll" style="border:1px solid #DFE3E4;background:#fff;color:#00853C;border-radius:12px;padding:4px 11px;font-size:11.5px;font-weight:600;cursor:pointer">全選</button>'
      +     '<button data-action="pickNone" style="border:1px solid #DFE3E4;background:#fff;color:#515A5D;border-radius:12px;padding:4px 11px;font-size:11.5px;font-weight:600;cursor:pointer">全不選</button>'
      +   '</div>'
      + '</div>'
      + '<div style="display:flex;flex-wrap:wrap;gap:16px 22px">'+groups+'</div>'
      + '</div>';
  }
  function mapBodyHTML(){
    return '<div>'
      + filterBarHTML()
      + pickerHTML()
      + '<div id="cuss-board" style="display:flex;gap:18px;align-items:stretch">'
      +   mapPanelHTML() + matrixHTML()
      + '</div>'
      + '</div>';
  }

  // ---- tooltip ----
  var tip = document.getElementById('tip');
  function tipRow(lbl, s, statusField, vendorField, dateField){
    var st = STATUS[s[statusField]];
    var extra = [];
    if(s[vendorField]) extra.push('系統商 '+esc(s[vendorField]));
    if(dateField && s[dateField]) extra.push(esc(s[dateField]));
    var tail = extra.length ? ' <span style="color:#9DB3A8">· '+extra.join(' · ')+'</span>' : '';
    return '<div style="display:flex;align-items:center;gap:6px;margin-top:3px"><span style="width:8px;height:8px;border-radius:2px;background:'+st.color+';flex:none"></span><b style="width:30px;display:inline-block">'+lbl+'</b>'+st.label+tail+'</div>';
  }
  function showTip(s, x, y){
    var head = '<div style="font-size:14px;font-weight:800;letter-spacing:.5px">'+esc(s.code)
      + (s.kpi?' <span style="font-size:9px;color:#8FE3B6;border:1px solid #8FE3B6;border-radius:6px;padding:0 4px;vertical-align:middle">KPI</span>':'')
      + (s.bagTag?' <span style="font-size:9px;color:#EAD7A0;border:1px solid #EAD7A0;border-radius:6px;padding:0 4px;vertical-align:middle">行李條</span>':'')
      + '</div>'
      + '<div style="font-size:10.5px;color:#9DB3A8;margin-bottom:5px">'+esc(s.region||'—')+' · '+esc(s.phase)+'</div>';
    var rows = tipRow('CUSS',s,'cuss','cussVendor','cussDate')+tipRow('SBD',s,'sbd','sbdVendor','sbdDate')+tipRow('SBG',s,'sbg','sbgVendor',null);
    var note = s.note ? '<div style="margin-top:7px;padding-top:6px;border-top:1px solid rgba(255,255,255,.14);color:#C7D6CE;white-space:pre-wrap">'+esc(s.note)+'</div>' : '';
    tip.innerHTML = head + rows + note;
    tip.style.display = 'block';
    tip.style.opacity = '1';
    positionTip(x, y);
  }
  function positionTip(x, y){
    var w = tip.offsetWidth, h = tip.offsetHeight;
    var nx = x + 16, ny = y + 16;
    if(nx + w > window.innerWidth - 8) nx = x - w - 16;
    if(ny + h > window.innerHeight - 8) ny = window.innerHeight - h - 8;
    if(ny < 8) ny = 8;
    tip.style.left = nx + 'px';
    tip.style.top = ny + 'px';
  }
  function hideTip(){ tip.style.opacity = '0'; tip.style.display = 'none'; }

  // ---- event delegation ----
  var app = document.getElementById('app');
  var mapDrag = null, mapPanned = false;
  app.addEventListener('click', function(e){
    var t = e.target.closest ? e.target.closest('[data-action]') : null;
    if(!t) return;
    var a = t.getAttribute('data-action');
    var id = t.getAttribute('data-id'); if(id!=null) id = +id;
    switch(a){
      case 'addStation': addStation(); break;
      case 'toggleQuick': toggleQuick(); break;
      case 'exportPNG': exportPNG(t.getAttribute('data-target'), t.getAttribute('data-file')); break;
      case 'clearFilters': clearFilters(); break;
      case 'toggleComboMenu': toggleComboMenu(); break;
      case 'closeComboMenu': closeComboMenu(); break;
      case 'toggleCombo': toggleCombo(t.getAttribute('data-combo')); break;
      case 'clearCombo': clearCombo(); break;
      case 'toggleLegendSwatch': state.legendShowShape = !(state.legendShowShape !== false); render(); break;
      case 'togglePicker': togglePicker(); break;
      case 'toggleExclude': toggleExclude(id); break;
      case 'pickAll': setAllExcluded(false); break;
      case 'pickNone': setAllExcluded(true); break;
      case 'importData': importData(); break;
      case 'saveAsHTML': saveAsHTML(); break;
      case 'toggleLog': toggleLog(); break;
      case 'closeLog': closeLog(e, t); break;
      case 'clearLog': clearLog(); break;
      case 'exportJSON': exportJSON(); break;
      case 'exportCSV': exportCSV(); break;
      case 'resetData': resetData(); break;
      case 'closePanel': closePanel(); break;
      case 'deleteStation': deleteStation(id); break;
      case 'group': setGroupMode(t.getAttribute('data-mode')); break;
      case 'view': setView(t.getAttribute('data-view')); break;
      case 'mapTheme': setMapTheme(t.getAttribute('data-theme')); break;
      case 'mapPalette': setMapPalette(t.getAttribute('data-pal')); break;
      case 'dotColor': setDotColor(t.getAttribute('data-dc')); break;
      case 'kpiRing': setKpiRing(t.getAttribute('data-kr')==='on'); break;
      case 'showNames': setShowNames(t.getAttribute('data-sn')==='on'); break;
      case 'zoomMap': zoomMap(+t.getAttribute('data-k')); break;
      case 'resetMapView': resetMapView(); break;
      case 'resetMapDefaults': resetMapDefaults(); break;
      case 'select': if(mapPanned){ mapPanned=false; break; } select(id); break;
      case 'toggleKpi': var s=find(id); if(s) setField(id,'kpi',!s.kpi); break;
      case 'toggleBagTag': var sb=find(id); if(sb) setField(id,'bagTag',!sb.bagTag); break;
      case 'setField': setField(id, t.getAttribute('data-field'), t.getAttribute('data-val')); break;
      case 'chipTop':
        if(state.quickMode){ hideTip(); cycle(id,'cuss'); } else select(id);
        break;
      case 'chipBot':
        if(state.quickMode){ hideTip(); cycle(id,'sbd'); } else select(id);
        break;
    }
  });
  app.addEventListener('change', function(e){
    var t = e.target;
    if(t.getAttribute && t.getAttribute('data-dotsize')!==null){ setDotScale(+t.value); return; }
    if(t.getAttribute && t.getAttribute('data-mapnamesize')!==null){ setMapNameScale(+t.value); return; }
    if(t.getAttribute && t.getAttribute('data-maplegendsize')!==null){ setMapLegendFont(+t.value); return; }
    var flt = t.getAttribute && t.getAttribute('data-filter');
    if(flt){ setFilter(flt, t.value); return; }
    var inp = t.getAttribute && t.getAttribute('data-input');
    if(!inp) return;
    var id = +t.getAttribute('data-id');
    var val = t.value;
    if(inp==='code') val = (val||'').toUpperCase();
    else if(NUMFIELDS[inp]) val = Math.max(0, Math.round(+val||0));
    setField(id, inp, val);
  });
  app.addEventListener('mouseover', function(e){
    var c = e.target.closest ? e.target.closest('[data-tip]') : null;
    if(!c) return;
    var s = find(+c.getAttribute('data-tip'));
    if(s) showTip(s, e.clientX, e.clientY);
  });
  app.addEventListener('mousemove', function(e){
    if(tip.style.display==='block') positionTip(e.clientX, e.clientY);
  });
  app.addEventListener('mouseout', function(e){
    var c = e.target.closest ? e.target.closest('[data-tip]') : null;
    if(!c) return;
    var to = e.relatedTarget;
    if(to && c.contains(to)) return;
    hideTip();
  });
  // ---- coverage-card ⇄ station-chip cross-highlight ----
  // hovering a coverage card outlines its stations' chips in the right panel.
  function highlightCard(card, on){
    if(!card) return;
    card.style.borderColor = on ? '#EE7623' : '#E4EBE6';
    card.style.boxShadow = on ? '0 2px 10px rgba(238,118,35,.18)' : 'none';
    var ids = (card.getAttribute('data-cardids')||'').split(',').filter(Boolean);
    ids.forEach(function(id){
      var chip = app.querySelector('.chip[data-tip="'+id+'"]');
      if(!chip) return;
      chip.style.outline = on ? '3px solid #EE7623' : '';
      chip.style.outlineOffset = on ? '2px' : '';
      chip.style.zIndex = on ? '6' : '';
    });
  }
  app.addEventListener('mouseover', function(e){
    var card = e.target.closest ? e.target.closest('.covcard[data-cardids]') : null;
    if(card) highlightCard(card, true);
  });
  app.addEventListener('mouseout', function(e){
    var card = e.target.closest ? e.target.closest('.covcard[data-cardids]') : null;
    if(!card) return;
    var to = e.relatedTarget;
    if(to && card.contains(to)) return;   // still inside the same card
    highlightCard(card, false);
  });

  // click outside the open station picker (and not on its toggle) collapses it
  document.addEventListener('click', function(e){
    if(!state.pickerOpen) return;
    var t = e.target;
    if(t.closest && (t.closest('#station-picker') || t.closest('[data-action="togglePicker"]'))) return;
    state.pickerOpen = false; render();
  });

  document.addEventListener('keydown', function(e){
    if(e.key==='Escape'){ if(state.logOpen){ state.logOpen=false; render(); } else if(state.pickerOpen){ state.pickerOpen=false; render(); } else if(state.selectedId!=null) closePanel(); }
  });

  // ---- dot size slider ----
  // live: only update the % label while dragging (re-rendering mid-drag would
  // destroy the slider element); apply the new size on release (change).
  app.addEventListener('input', function(e){
    var t = e.target;
    if(!t.getAttribute) return;
    if(t.getAttribute('data-dotsize')!==null || t.getAttribute('data-mapnamesize')!==null){
      var lbl = t.parentElement && t.parentElement.querySelector('span:last-child');
      if(lbl) lbl.textContent = Math.round((+t.value)*100)+'%';
      return;
    }
    if(t.getAttribute('data-maplegendsize')!==null){
      var lv = +t.value; state.mapLegendFont = lv;
      var sec = document.getElementById('map-export');
      if(sec) sec.style.setProperty('--map-legend-font', lv+'px');
      var mll = t.parentElement && t.parentElement.querySelector('span:last-child');
      if(mll) mll.textContent = lv+'px';
      return;
    }
    // font-size sliders: update the CSS var live on the board container (no
    // re-render, so the slider keeps focus) and persist the value in state.
    if(t.getAttribute('data-chipfont')!==null){
      var v = +t.value; state.chipFont = v;
      var board = document.getElementById('cuss-board');
      if(board) board.style.setProperty('--chip-font', v+'px');
      var cl = t.parentElement && t.parentElement.querySelector('[data-chipfontlbl]');
      if(cl) cl.textContent = v+'px';
      return;
    }
    if(t.getAttribute('data-legendfont')!==null){
      var lv = +t.value; state.legendFont = lv;
      var board2 = document.getElementById('cuss-board');
      if(board2) board2.style.setProperty('--legend-font', lv+'px');
      var ll = t.parentElement && t.parentElement.querySelector('[data-legendfontlbl]');
      if(ll) ll.textContent = lv+'px';
      return;
    }
  });

  // ---- map pan (drag) & zoom (wheel) ----
  document.addEventListener('pointerdown', function(e){
    var svg = e.target.closest ? e.target.closest('#worldmap') : null;
    if(!svg) return;
    var rect = svg.getBoundingClientRect();
    mapDrag = { sx:e.clientX, sy:e.clientY, vb:{x:state.mapVB.x,y:state.mapVB.y,w:state.mapVB.w,h:state.mapVB.h}, rect:rect, moved:0 };
    mapPanned = false;
    svg.style.cursor = 'grabbing';
  });
  document.addEventListener('pointermove', function(e){
    if(!mapDrag) return;
    var dx = e.clientX-mapDrag.sx, dy = e.clientY-mapDrag.sy;
    mapDrag.moved = Math.max(mapDrag.moved, Math.abs(dx)+Math.abs(dy));
    var vb = mapDrag.vb, rect = mapDrag.rect;
    state.mapVB = { x: vb.x - dx/rect.width*vb.w, y: vb.y - dy/rect.height*vb.h, w: vb.w, h: vb.h };
    applyMapVB();
  });
  document.addEventListener('pointerup', function(){
    if(!mapDrag) return;
    var panned = mapDrag.moved > 4;
    if(panned) mapPanned = true;
    var svg = document.getElementById('worldmap'); if(svg) svg.style.cursor = 'grab';
    mapDrag = null;
    // re-run label de-collision for the new view when names are shown
    if(panned && state.showNames) render();
  });
  document.addEventListener('wheel', function(e){
    var svg = e.target.closest ? e.target.closest('#worldmap') : null;
    if(!svg) return;
    e.preventDefault();
    var rect = svg.getBoundingClientRect(), vb = state.mapVB;
    var fx = (e.clientX-rect.left)/rect.width, fy = (e.clientY-rect.top)/rect.height;
    var px = vb.x + fx*vb.w, py = vb.y + fy*vb.h;
    var k = e.deltaY < 0 ? 1/1.15 : 1.15;
    var nw = Math.max(120, Math.min(1600, vb.w*k));
    var nh = nw * VB_RATIO;
    state.mapVB = { x: px - fx*nw, y: py - fy*nh, w: nw, h: nh };
    // recompute label layout for the new zoom when names are shown (discrete wheel
    // steps, so a full re-render is fine); otherwise just move the viewBox.
    if(state.showNames){ if(!wheelRAF) wheelRAF = requestAnimationFrame(function(){ wheelRAF=0; render(); }); }
    else applyMapVB();
  }, { passive:false });
  var wheelRAF = 0;

  render();
})();
</script>
</body>
</html>
