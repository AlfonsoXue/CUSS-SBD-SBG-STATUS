  // ---- derive coverage ----
  function countBy(f){
    var c = {online:0,paused:0,building:0,evaluating:0,none:0};
    state.stations.forEach(function(s){ if(c[s[f]]!=null) c[s[f]]++; });
    return c;

  function stage(n, code, desc, f){
    var total = state.stations.length || 1;
    var c = countBy(f);
    var pct = Math.round((c.online/total)*100);
    var segs = ORDER.filter(function(k){ return c[k]>0; }).map(function(k){
      var w = (c[k]/total)*100;
      return { w:+w.toFixed(2), color:STATUS[k].color, textOn:STATUS[k].textOn, label: w>=6 ? String(c[k]) : '' };
    });
    var legend = ORDER.map(function(k){ return { color:STATUS[k].color, mark:STATUS[k].mark, text:c[k], label:STATUS[k].label }; });
    return { n:n, code:code, desc:desc, pctLabel: pct+'%', online:c.online, segs:segs, legend:legend };
  }

  var phaseDot = {
    '2025前':STATUS.online.color, '2026/Q1':STATUS.online.color, '2026/Q2':STATUS.online.color,
    '2026/Q3':STATUS.building.color, '2026/Q4':STATUS.building.color, '暫定2027':STATUS.evaluating.color,
    '未排程':STATUS.none.color
  };

  // ---- scoring for map & matrix ----
  var STATUS_WEIGHT = { online:1, paused:0.55, building:0.45, evaluating:0.2, none:0 };
  function automationScore(s){ return (STATUS_WEIGHT[s.cuss] + STATUS_WEIGHT[s.sbd] + STATUS_WEIGHT[s.sbg]) / 3; }
  // log-scale volume normalized to the pax range of a given station set (so the
  // matrix axis rescales to whatever is currently visible/filtered).
  function paxRange(list){
    var lo = Infinity, hi = -Infinity;
    (list||[]).forEach(function(s){ var v = Math.log(Math.max(1, +s.pax||0)); if(v<lo) lo=v; if(v>hi) hi=v; });
    if(!isFinite(lo)){ lo = Math.log(500); hi = Math.log(250000); }
    return { lo:lo, hi:hi };
  }
  function volumeScoreIn(s, range){
    var v = Math.log(Math.max(1, +s.pax||0));
    if(range.hi - range.lo < 1e-9) return 0.5;
    return Math.max(0, Math.min(1, (v - range.lo) / (range.hi - range.lo)));
  }
  function volumeScore(s){ return volumeScoreIn(s, paxRange(state.stations)); }
  var AUTO_THRESHOLD = 0.5, VOL_THRESHOLD = 0.5;
  // quadrants keyed by (hiVol, hiAuto)
  var QUAD = {
    matureLow:  { name:'成熟場站',   color:'#00853C', tint:'#EAF3EE', desc:'設備完整，可作為服務 2.0 示範站', icon:'bars' },
    priority:   { name:'重點場站', color:'#EE7623', tint:'#FCEEE2', desc:'航班量大、旅客量大、櫃台壓力高，將持續最佳化旅客流程', icon:'star' },
    limited:    { name:'限制型場站', color:'#C79A2E', tint:'#F7F1E0', desc:'受限機場設施、空間或 GHA 作業模式', icon:'warn' },
    progress:   { name:'進行中場站', color:'#3F9E86', tint:'#E6F1EE', desc:'已有部分自助功能，仍需補足行李、證件或付款流程', icon:'refresh' }
  };
  function quadrantOf(s){
    var hiV = volumeScore(s) >= VOL_THRESHOLD;
    var hiA = automationScore(s) >= AUTO_THRESHOLD;
    if(hiA && !hiV) return QUAD.matureLow;
    if(hiA && hiV)  return QUAD.priority;
    if(!hiA && !hiV) return QUAD.limited;
    return QUAD.progress;
  }

  // priority tier (1 = leftmost / highest):
  //  1 三階段完備 + CUSS 列印行李條   2 CUSS+SBD 完備 + CUSS 列印行李條
  //  3 三階段完備                     4 CUSS/SBD 完備      5 其餘（原始規則）
  function tierRank(s){
    var allThree = s.cuss==='online' && s.sbd==='online' && s.sbg==='online';
    var cussSbd  = s.cuss==='online' && s.sbd==='online';
    var bag = !!s.bagTag;
    if(allThree && bag) return 1;
    if(cussSbd && bag)  return 2;
    if(allThree)        return 3;
    if(cussSbd)         return 4;
    return 5;
  }
  // order chips left→right: priority tier first, then the original rule
  // (automation completeness high→low, then CUSS status, then code)
  function byAutomation(a, b){
    var t = tierRank(a) - tierRank(b);
    if(t) return t;
    var d = automationScore(b) - automationScore(a);
    if(Math.abs(d) > 1e-9) return d;
    var c = STATUS_WEIGHT[b.cuss] - STATUS_WEIGHT[a.cuss];
    if(c) return c;
    return (a.code||'').localeCompare(b.code||'');
  }
  function phaseIndex(s){ var i = PHASES.indexOf(s.phase); return i<0 ? PHASES.length : i; }
  // region view: order by build schedule first, then the completeness tier rule
  function byPhaseThenAuto(a, b){
    var d = phaseIndex(a) - phaseIndex(b);
    if(d) return d;
    return byAutomation(a, b);
  }
  function groupList(){

      // stations with empty region
      if(state.stations.some(function(s){ return !s.region; })) regs.push('');
      return regs.map(function(r){
        return { name: r || '未分區', dot:'#00853C', items: state.stations.filter(function(s){ return (s.region||'')===r; }).sort(byPhaseThenAuto) };
      });
    }
    return PHASES.map(function(p){
      return { name:p, dot:phaseDot[p]||STATUS.evaluating.color, items: state.stations.filter(function(s){ return s.phase===p; }).sort(byAutomation) };
    });
  }

  // ---- map ----
  var MW = 1000, MH = 500;
  function mproj(lat, lon){ return { x:(lon+180)/360*MW, y:(90-lat)/180*MH }; }
  // continent -> our-region membership for choropleth (based on station.region groups)
  var CONT_LABEL = {
    'North America':'美洲','South America':'南美','Europe':'歐洲','Africa':'非洲','Asia':'亞洲','Oceania':'大洋洲'
  };
  var CONT_COLOR = {
    'North America':'#7FB3D5','South America':'#F5B041','Europe':'#82C4A6','Africa':'#E59866','Asia':'#C39BD3','Oceania':'#76D7C4'
  };
  function coverageByContinent(list){
    // % of stations online (cuss) per continent, mapped from station.region
    var regionToCont = {'美洲':'North America','歐洲':'Europe','東南亞':'Asia','東北亞':'Asia','大陸':'Asia','港澳':'Asia','台灣區':'Asia','紐澳':'Oceania'};
    var agg = {};
    (list||state.stations).forEach(function(s){
      var c = regionToCont[s.region]; if(!c) return;
      agg[c] = agg[c] || {on:0, tot:0};
      agg[c].tot++; if(s.cuss==='online') agg[c].on++;
    });
    return agg;
  }
  function continentFill(cont, list){
    if(state.mapTheme==='dark'){
      if(state.mapPalette==='region') return CONT_COLOR[cont] ? shade(CONT_COLOR[cont], -0.35) : '#2A3338';
      if(state.mapPalette==='mono') return '#3A454B';
    }
    if(state.mapPalette==='mono') return '#D7DCDE';
    if(state.mapPalette==='brand') return '#CDE4D7';
    if(state.mapPalette==='coverage'){
      var agg = coverageByContinent(list)[cont];
      var r = agg && agg.tot ? agg.on/agg.tot : 0;
      // green ramp
      return mix('#EAF1EE', '#00853C', r);
    }
    return CONT_COLOR[cont] || '#D7DCDE'; // region
  }
  function hexToRgb(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  function rgbToHex(a){ return '#'+a.map(function(v){ v=Math.max(0,Math.min(255,Math.round(v))); return (v<16?'0':'')+v.toString(16); }).join(''); }
  function mix(a,b,t){ var A=hexToRgb(a),B=hexToRgb(b); return rgbToHex([A[0]+(B[0]-A[0])*t,A[1]+(B[1]-A[1])*t,A[2]+(B[2]-A[2])*t]); }
  function shade(a,t){ return t<0 ? mix(a,'#000000',-t) : mix(a,'#ffffff',t); }

  function dotFill(s){
    if(state.dotColor==='region'){
      var rc = {'美洲':'#3E7CB1','歐洲':'#2E8B57','東南亞':'#E8A400','東北亞':'#C0392B','大陸':'#8E44AD','港澳':'#16A085','台灣區':'#00853C','紐澳':'#D35400'};
      return rc[s.region] || '#6E787B';
    }
    return STATUS[s.cuss].color; // cuss status
  }
  function baseDotRadius(s){ return 3.2 + Math.log(Math.max(1,+s.pax||0)) * 0.72; }

  // Spread overlapping map dots apart (collision resolution) with a spring back
  // to each dot's true geographic point — dense regions fan out, isolated dots
  // stay put, and nothing overlaps.
  function spreadDots(items){
    var N=items.length, pad=1.0, i, j, k, a, b, dx, dy, d, min, push, ux, uy;
    // phase 1: collide + weak spring to home (positions dots near geography)
    for(var it=0; it<110; it++){
      for(i=0;i<N;i++)for(j=i+1;j<N;j++){
        a=items[i]; b=items[j];
        dx=a.x-b.x; dy=a.y-b.y; d=Math.sqrt(dx*dx+dy*dy)||0.01; min=a.R+b.R+pad;
        if(d<min){ push=(min-d)/2; ux=dx/d; uy=dy/d; a.x+=ux*push; a.y+=uy*push; b.x-=ux*push; b.y-=uy*push; }
      }
      for(k=0;k<N;k++){ a=items[k]; a.x+=(a.tx-a.x)*0.05; a.y+=(a.ty-a.y)*0.05; }
    }
    // phase 2: collision-only until settled — guarantees no overlap
    for(it=0; it<60; it++){
      var moved=false;
      for(i=0;i<N;i++)for(j=i+1;j<N;j++){
        a=items[i]; b=items[j];
        dx=a.x-b.x; dy=a.y-b.y; d=Math.sqrt(dx*dx+dy*dy)||0.01; min=a.R+b.R+pad;
        if(d<min){ push=(min-d)/2+0.02; ux=dx/d; uy=dy/d; a.x+=ux*push; a.y+=uy*push; b.x-=ux*push; b.y-=uy*push; moved=true; }
      }
      if(!moved) break;
    }
    for(k=0;k<N;k++){ a=items[k];
      a.x=Math.max(a.R, Math.min(1000-a.R, a.x));
      a.y=Math.max(12+a.R, Math.min(420-a.R, a.y));
    }
  }

  // Nudge overlapping labels apart (box separation) with a weak spring back to
  // each dot, so uncrowded labels stay put and crowded ones fan out.
  function layoutLabels(items){
    var N = items.length, i, j, it;
    for(it=0; it<70; it++){
      for(i=0;i<N;i++){
        for(j=i+1;j<N;j++){
          var a=items[i], b=items[j];
          var dx=a.lx-b.lx, dy=a.ly-b.ly;
          var ox=(a.w+b.w)/2 + 1.4 - Math.abs(dx);
          var oy=(a.h+b.h)/2 + 1.0 - Math.abs(dy);
          if(ox>0 && oy>0){
            if(ox<oy){ var s1=(dx===0?(i&1?1:-1):(dx>0?1:-1))*ox*0.5; a.lx+=s1; b.lx-=s1; }
            else     { var s2=(dy===0?(i&1?1:-1):(dy>0?1:-1))*oy*0.5; a.ly+=s2; b.ly-=s2; }
          }
        }
      }
      for(i=0;i<N;i++){ it=items[i]; it.lx += (it.hx-it.lx)*0.05; it.ly += (it.hy-it.ly)*0.05; }
    }
  }

  function mapSVGHTML(){
    var visible = filteredStations();
    var ocean = state.mapTheme==='dark' ? '#161E22' : '#EAF1F4';
    var stroke = state.mapTheme==='dark' ? '#0E1417' : '#FFFFFF';
    var dotStroke = state.mapTheme==='dark' ? '#0E1417' : '#fff';
    var leadStroke = state.mapTheme==='dark' ? '#6C7A72' : '#8A968F';
    var sc = state.dotScale;
    var names = state.showNames;
    var twoTone = state.dotColor==='cuss';
    var cussFrac = names ? 0.70 : 0.56;   // CUSS (top) always the larger share; more room for the label when names show
    var land = MAPCONT.map(function(c){
      return '<path d="'+c.p+'" fill="'+continentFill(c.c, visible)+'" stroke="'+stroke+'" stroke-width="0.6"/>';
    }).join('');
    // build dot list, then spread apart so nothing overlaps (kept near true geo)
    var pool = visible.filter(function(s){ return GEO[s.code]||(s.lat!=null); }).map(function(s){
      var p = mproj(GEO[s.code].lat, GEO[s.code].lon);
      var R = baseDotRadius(s) * sc;
      return { s:s, tx:p.x, ty:p.y, x:p.x, y:p.y, R:R };
    });
    spreadDots(pool);
    // draw smaller (lower pax) dots first, big hubs on top
    pool.sort(function(a,b){ return (a.s.pax||0)-(b.s.pax||0); });
    // label font in world units scales with zoom so on-screen size stays ~constant
    // → zooming into a dense cluster genuinely de-crowds the labels
    var vbNow = state.mapVB;
    var labelFS = Math.max(2.6, Math.min(16, 9.5 * (vbNow.w / BASE_VB.w)));
    var defs = '', dots = '', labelItems = [];
    pool.forEach(function(m){
      var s = m.s;
      var cx = +m.x.toFixed(1), cy = +m.y.toFixed(1);
      var R = +m.R.toFixed(1);
      var body;
      if(twoTone){
        var cid = 'dc'+s.id;
        var xL = (cx-R).toFixed(1), yT = (cy-R).toFixed(1), W = (2*R).toFixed(1), FULL = (2*R).toFixed(1);
        // full SBD base, then CUSS overlay on top — avoids the antialiased seam
        // a pair of adjacent rects would leave at the split
        var topH = (2*R*cussFrac).toFixed(1);
        defs += '<clipPath id="'+cid+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+R+'"/></clipPath>';
        body = '<g clip-path="url(#'+cid+')">'
          + '<rect x="'+xL+'" y="'+yT+'" width="'+W+'" height="'+FULL+'" fill="'+STATUS[s.sbd].color+'"/>'
          + '<rect x="'+xL+'" y="'+yT+'" width="'+W+'" height="'+topH+'" fill="'+STATUS[s.cuss].color+'"/>'
          + '</g>'
          + '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="'+dotStroke+'" stroke-width="0.9"/>';
      } else {
        body = '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="'+dotFill(s)+'" fill-opacity="0.92" stroke="'+dotStroke+'" stroke-width="0.9"/>';
      }
      var selRing = s.id===state.selectedId ? '<circle cx="'+cx+'" cy="'+cy+'" r="'+(R+3.5).toFixed(1)+'" fill="none" stroke="#00853C" stroke-width="1.6"/>' : '';
      var kpiRing = (s.kpi && state.showKpiRing) ? '<circle cx="'+cx+'" cy="'+cy+'" r="'+(R+2).toFixed(1)+'" fill="none" stroke="#fff" stroke-width="1.3"/>' : '';
      dots += '<g data-tip="'+s.id+'" data-action="select" data-id="'+s.id+'" style="cursor:pointer">'+selRing+body+kpiRing+'</g>';
      if(names){
        var hy = twoTone ? (cy - R + R*cussFrac) : cy;   // home = on the dot (CUSS band)
        labelItems.push({ s:s, cx:cx, cy:cy, fs:labelFS, hx:cx, hy:hy, lx:cx, ly:hy,
                          w: s.code.length*labelFS*0.62, h: labelFS });
      }
    });
    // de-collide labels and draw leader lines for the ones that got pulled out
    var leaders = '', labels = '';
    if(names && labelItems.length){
      layoutLabels(labelItems);
      labelItems.forEach(function(m){
        var moved = Math.abs(m.lx-m.hx) + Math.abs(m.ly-m.hy) > 1.6;
        if(moved){
          leaders += '<line x1="'+m.cx.toFixed(1)+'" y1="'+m.cy.toFixed(1)+'" x2="'+m.lx.toFixed(1)+'" y2="'+m.ly.toFixed(1)+'" stroke="'+leadStroke+'" stroke-width="0.55" stroke-opacity="0.85"/>'
            + '<circle cx="'+m.lx.toFixed(1)+'" cy="'+m.ly.toFixed(1)+'" r="0.9" fill="'+leadStroke+'"/>';
        }
        var by = (m.ly + m.fs*0.34).toFixed(1);
        labels += '<text x="'+m.lx.toFixed(1)+'" y="'+by+'" text-anchor="middle" font-size="'+m.fs.toFixed(1)+'" font-weight="800" font-family="system-ui,sans-serif" fill="#fff" stroke="rgba(18,26,22,.62)" stroke-width="'+(m.fs*0.2).toFixed(2)+'" paint-order="stroke" style="pointer-events:none">'+esc(m.s.code)+'</text>';
      });
    }
    var vb = state.mapVB;
    return '<svg id="worldmap" viewBox="'+vb.x+' '+vb.y+' '+vb.w+' '+vb.h+'" preserveAspectRatio="xMidYMid meet" width="100%" style="display:block;background:'+ocean+';border-radius:10px;touch-action:none;cursor:grab" xmlns="http://www.w3.org/2000/svg">'
      + '<defs>'+defs+'</defs>' + land + leaders + dots + labels + '</svg>';
  }

    if(kind==='refresh') return o+'<path d="M20 12a8 8 0 1 1-2.3-5.6M20 4v4h-4" '+s+'/></svg>';

  // Snap matrix dots onto a tidy grid: each dot takes the free cell nearest its
  // ideal (volume, automation) position, so dots never overlap yet stay ordered.
  function gridSnapMatrix(items){
    var COLS=14, ROWS=12, MX=4, SPAN=92, occ={};
    items.sort(function(a,b){ return (b.s.pax||0)-(a.s.pax||0); });   // hubs claim their cell first
    items.forEach(function(m){
      var c0=Math.round(m.fx*(COLS-1)), r0=Math.round((1-m.fy)*(ROWS-1)), best=null;
      for(var rad=0; rad<COLS+ROWS && !best; rad++){
        var bd=Infinity, bc=null;
        for(var dc=-rad;dc<=rad;dc++)for(var dr=-rad;dr<=rad;dr++){
          if(Math.max(Math.abs(dc),Math.abs(dr))!==rad) continue;
          var c=c0+dc, r=r0+dr;
          if(c<0||c>=COLS||r<0||r>=ROWS||occ[c+'_'+r]) continue;
          var dd=dc*dc*1.15+dr*dr;   // slight horizontal-spread preference
          if(dd<bd){ bd=dd; bc={c:c,r:r}; }
        }
        if(bc) best=bc;
      }
      if(!best) best={c:c0,r:r0};
      occ[best.c+'_'+best.r]=1;
      m.left = MX + (best.c+0.5)/COLS*SPAN;
      m.top  = MX + (best.r+0.5)/ROWS*SPAN;
    });
  }

    var body = state.view==='board' ? boardBody : mapBodyHTML();
    var hint = state.view==='board'
      ? '提示：<b style="color:#00853C">游標移至方塊</b>可顯示完整資訊（現況／系統商／時程／各站進度）；點方塊開啟右側編輯面板。開啟「快速切換模式」後，點方塊<b style="color:#00853C">上半</b>循環切換 CUSS、點<b style="color:#00853C">下半</b>切換 SBD。'
      : '提示：地圖可<b style="color:#00853C">拖曳移動、滾輪縮放</b>，並可調整<b style="color:#00853C">圓圈大小</b>與 KPI 白框顯示。圓點大小＝旅客量、顏色＝現況；游標移至圓點顯示詳情、點擊開啟編輯面板。右側矩陣依自動化完備度與旅客量／航班量分類。';

    var html =
      '<div style="min-height:100vh;display:flex;flex-direction:column">'
      + '<header style="display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;padding:16px 26px;background:#fff;border-bottom:1px solid #DFE3E4">'
      +   '<div style="display:flex;flex-direction:column;gap:3px">'
      +     '<div style="font-size:20px;font-weight:900;color:#00853C;letter-spacing:.5px">機場自助化設備建置儀表板</div>'
      +     '<div style="font-size:12px;color:#6E787B">旅客自助旅程 · 三階段設備覆蓋 &nbsp;|&nbsp; 全球 '+stationCount+' 個納管場站 &nbsp;|&nbsp; 資料基準 '+dataDate+'</div>'
      +   '</div>'
      +   '<div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">'
      +     viewSwitch
      +     '<button data-action="addStation" style="border:none;background:#00853C;color:#fff;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer">＋ 新增場站</button>'
      +     quickBtn
      +     '<button data-action="exportPNG" style="border:1.5px solid #C7CDCF;background:#fff;color:#141819;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer">匯出圖片</button>'
      +     '<button data-action="exportJSON" style="border:1.5px solid #E4EBE6;background:#fff;color:#515A5D;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer">匯出 JSON</button>'
      +     '<button data-action="exportCSV" style="border:1.5px solid #E4EBE6;background:#fff;color:#515A5D;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer">匯出 CSV</button>'
      +     '<button data-action="resetData" style="border:1.5px solid #E4EBE6;background:#fff;color:#515A5D;border-radius:18px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer">重設</button>'
      +   '</div>'
      + '</header>'
      + '<div style="padding:6px 26px 0;font-size:11.5px;color:#8A938F">'+hint+'</div>'
      + '<div style="flex:1;padding:16px 26px 30px">'+body+'</div>'
      + '</div>'
      + (sel ? panelHTML(sel) : '');

    document.getElementById('app').innerHTML = html;
  }

  // ---- tooltip ----
  var tip = document.getElementById('tip');
  function tipRow(lbl, s, statusField, vendorField, dateField){
    var st = STATUS[s[statusField]];
    var extra = [];
    if(s[vendorField]) extra.push('系統商 '+esc(s[vendorField]));
    if(dateField && s[dateField]) extra.push(esc(s[dateField]));
    var tail = extra.length ? ' <span style="color:#9DB3A8">· '+extra.join(' · ')+'</span>' : '';
    return '<div style="display:flex;align-items:center;gap:6px;margin-top:3px"><span style="width:8px;height:8px;border-radius:2px;background:'+st.color+';flex:none"></span><b style="width:30px;display:inline-block">'+lbl+'</b>'+st.label+tail+'</div>';
  }
  function showTip(s, x, y){
    var head = '<div style="font-size:14px;font-weight:800;letter-spacing:.5px">'+esc(s.code)
      + (s.kpi?' <span style="font-size:9px;color:#8FE3B6;border:1px solid #8FE3B6;border-radius:6px;padding:0 4px;vertical-align:middle">KPI</span>':'')
      + (s.bagTag?' <span style="font-size:9px;color:#EAD7A0;border:1px solid #EAD7A0;border-radius:6px;padding:0 4px;vertical-align:middle">行李條</span>':'')
      + '</div>'
      + '<div style="font-size:10.5px;color:#9DB3A8;margin-bottom:5px">'+esc(s.region||'—')+' · '+esc(s.phase)+'</div>';
    var rows = tipRow('CUSS',s,'cuss','cussVendor','cussDate')+tipRow('SBD',s,'sbd','sbdVendor','sbdDate')+tipRow('SBG',s,'sbg','sbgVendor',null);
    var note = s.note ? '<div style="margin-top:7px;padding-top:6px;border-top:1px solid rgba(255,255,255,.14);color:#C7D6CE;white-space:pre-wrap">'+esc(s.note)+'</div>' : '';
    tip.innerHTML = head + rows + note;
    tip.style.display = 'block';
    tip.style.opacity = '1';
    positionTip(x, y);
  }
  function positionTip(x, y){
    var w = tip.offsetWidth, h = tip.offsetHeight;
    var nx = x + 16, ny = y + 16;
    if(nx + w > window.innerWidth - 8) nx = x - w - 16;
    if(ny + h > window.innerHeight - 8) ny = window.innerHeight - h - 8;
    if(ny < 8) ny = 8;
    tip.style.left = nx + 'px';
    tip.style.top = ny + 'px';
  }
  function hideTip(){ tip.style.opacity = '0'; tip.style.display = 'none'; }

  // ---- event delegation ----
  var app = document.getElementById('app');
  var mapDrag = null, mapPanned = false;
  app.addEventListener('click', function(e){
    var t = e.target.closest ? e.target.closest('[data-action]') : null;
    if(!t) return;
    var a = t.getAttribute('data-action');
    var id = t.getAttribute('data-id'); if(id!=null) id = +id;
    switch(a){
      case 'addStation': addStation(); break;
      case 'toggleQuick': toggleQuick(); break;
      case 'exportPNG': exportPNG(t.getAttribute('data-target'), t.getAttribute('data-file')); break;
      case 'clearFilters': clearFilters(); break;
      case 'togglePicker': togglePicker(); break;
      case 'toggleExclude': toggleExclude(id); break;
      case 'pickAll': setAllExcluded(false); break;
      case 'pickNone': setAllExcluded(true); break;
      case 'exportJSON': exportJSON(); break;
      case 'exportCSV': exportCSV(); break;
      case 'resetData': resetData(); break;
      case 'closePanel': closePanel(); break;
      case 'deleteStation': deleteStation(id); break;
      case 'group': setGroupMode(t.getAttribute('data-mode')); break;
      case 'view': setView(t.getAttribute('data-view')); break;
      case 'mapTheme': setMapTheme(t.getAttribute('data-theme')); break;
      case 'mapPalette': setMapPalette(t.getAttribute('data-pal')); break;
      case 'dotColor': setDotColor(t.getAttribute('data-dc')); break;
      case 'kpiRing': setKpiRing(t.getAttribute('data-kr')==='on'); break;
      case 'showNames': setShowNames(t.getAttribute('data-sn')==='on'); break;
      case 'zoomMap': zoomMap(+t.getAttribute('data-k')); break;
      case 'resetMapView': resetMapView(); break;
      case 'select': if(mapPanned){ mapPanned=false; break; } select(id); break;
      case 'toggleKpi': var s=find(id); if(s) setField(id,'kpi',!s.kpi); break;
      case 'toggleBagTag': var sb=find(id); if(sb) setField(id,'bagTag',!sb.bagTag); break;
      case 'setField': setField(id, t.getAttribute('data-field'), t.getAttribute('data-val')); break;
      case 'chipTop':
        if(state.quickMode){ hideTip(); cycle(id,'cuss'); } else select(id);
        break;
      case 'chipBot':
        if(state.quickMode){ hideTip(); cycle(id,'sbd'); } else select(id);
        break;
    }
  });
  app.addEventListener('change', function(e){
    var t = e.target;
    if(t.getAttribute && t.getAttribute('data-dotsize')!==null){ setDotScale(+t.value); return; }
    var flt = t.getAttribute && t.getAttribute('data-filter');
    if(flt){ setFilter(flt, t.value); return; }
    var inp = t.getAttribute && t.getAttribute('data-input');
    if(!inp) return;
    var id = +t.getAttribute('data-id');
    var val = t.value;
    if(inp==='code') val = (val||'').toUpperCase();
    else if(NUMFIELDS[inp]) val = Math.max(0, Math.round(+val||0));
    setField(id, inp, val);
  });
  app.addEventListener('mouseover', function(e){
    var c = e.target.closest ? e.target.closest('[data-tip]') : null;
    if(!c) return;
    var s = find(+c.getAttribute('data-tip'));
    if(s) showTip(s, e.clientX, e.clientY);
  });
  app.addEventListener('mousemove', function(e){
    if(tip.style.display==='block') positionTip(e.clientX, e.clientY);
  });
  app.addEventListener('mouseout', function(e){
    var c = e.target.closest ? e.target.closest('[data-tip]') : null;
    if(!c) return;
    var to = e.relatedTarget;
    if(to && c.contains(to)) return;
    hideTip();
  });
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape' && state.selectedId!=null) closePanel();
  });

  // ---- dot size slider ----
  // live: only update the % label while dragging (re-rendering mid-drag would
  // destroy the slider element); apply the new size on release (change).
  app.addEventListener('input', function(e){
    var t = e.target;
    if(!t.getAttribute || t.getAttribute('data-dotsize')===null) return;
    var lbl = t.parentElement && t.parentElement.querySelector('span:last-child');
    if(lbl) lbl.textContent = Math.round((+t.value)*100)+'%';
  });

  // ---- map pan (drag) & zoom (wheel) ----
  document.addEventListener('pointerdown', function(e){
    var svg = e.target.closest ? e.target.closest('#worldmap') : null;
    if(!svg) return;
    var rect = svg.getBoundingClientRect();
    mapDrag = { sx:e.clientX, sy:e.clientY, vb:{x:state.mapVB.x,y:state.mapVB.y,w:state.mapVB.w,h:state.mapVB.h}, rect:rect, moved:0 };
    mapPanned = false;
    svg.style.cursor = 'grabbing';
  });
  document.addEventListener('pointermove', function(e){
    if(!mapDrag) return;
    var dx = e.clientX-mapDrag.sx, dy = e.clientY-mapDrag.sy;
    mapDrag.moved = Math.max(mapDrag.moved, Math.abs(dx)+Math.abs(dy));
    var vb = mapDrag.vb, rect = mapDrag.rect;
    state.mapVB = { x: vb.x - dx/rect.width*vb.w, y: vb.y - dy/rect.height*vb.h, w: vb.w, h: vb.h };
    applyMapVB();
  });
  document.addEventListener('pointerup', function(){
    if(!mapDrag) return;
    var panned = mapDrag.moved > 4;
    if(panned) mapPanned = true;
    var svg = document.getElementById('worldmap'); if(svg) svg.style.cursor = 'grab';
    mapDrag = null;
    // re-run label de-collision for the new view when names are shown
    if(panned && state.showNames) render();
  });
  document.addEventListener('wheel', function(e){
    var svg = e.target.closest ? e.target.closest('#worldmap') : null;
    if(!svg) return;
    e.preventDefault();
    var rect = svg.getBoundingClientRect(), vb = state.mapVB;
    var fx = (e.clientX-rect.left)/rect.width, fy = (e.clientY-rect.top)/rect.height;
    var px = vb.x + fx*vb.w, py = vb.y + fy*vb.h;
    var k = e.deltaY < 0 ? 1/1.15 : 1.15;
    var nw = Math.max(120, Math.min(1600, vb.w*k));
    var nh = nw * VB_RATIO;
    state.mapVB = { x: px - fx*nw, y: py - fy*nh, w: nw, h: nh };
    // recompute label layout for the new zoom when names are shown (discrete wheel
    // steps, so a full re-render is fine); otherwise just move the viewBox.
    if(state.showNames){ if(!wheelRAF) wheelRAF = requestAnimationFrame(function(){ wheelRAF=0; render(); }); }
    else applyMapVB();
  }, { passive:false });
  var wheelRAF = 0;

  render();
})();
</script>
</body>
</html>
