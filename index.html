<title>機場自助化設備建置儀表板</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:system-ui,'PingFang TC','Microsoft JhengHei','Noto Sans TC',sans-serif;background:#EEF0F1;color:#141819}
  a{color:#00853C;text-decoration:none}
  a:hover{color:#005726}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#C7CDCF;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes sheetIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes scrimIn{from{opacity:0}to{opacity:1}}
  /* whole-map fade complements the per-white-line plate move/scale animation */
  @keyframes mapUnfold{from{opacity:.62}to{opacity:1}}
  .map-unfold{animation:mapUnfold .45s cubic-bezier(.22,.61,.36,1);transform-origin:50% 50%}
  input:focus,select:focus,textarea:focus{outline:2px solid #00853C;outline-offset:1px}
  button{font-family:inherit}
  .chip{transition:transform .12s ease}
  .chip:hover{transform:translateY(-2px)}
  #tip{position:fixed;z-index:60;max-width:320px;background:#141819;color:#EAF0EC;border-radius:10px;
       padding:11px 13px;font-size:11.5px;line-height:1.5;box-shadow:0 8px 26px rgba(0,0,0,.28);
       pointer-events:none;opacity:0;transition:opacity .12s ease;display:none}
  .fld{border:1px solid #DFE3E4;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;width:100%}
  .hovmenu-wrap{position:relative;display:inline-flex}
  .hovmenu{display:none;position:absolute;top:100%;right:0;padding-top:6px;z-index:58}
  .hovmenu-wrap:hover .hovmenu,.hovmenu-wrap:focus-within .hovmenu{display:block}
  .hovmenu-inner{background:#fff;border:1px solid #DFE3E4;border-radius:12px;box-shadow:0 12px 30px rgba(20,40,30,.22);padding:5px;min-width:180px;display:flex;flex-direction:column;gap:2px}
  .hovmenu-item{display:block;width:100%;text-align:left;border:none;background:#fff;color:#22312B;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;line-height:1.2}
  .hovmenu-item:hover{background:#EEF4F0;color:#00853C}
</style>
</head>

              s.note, s.schedNote].map(esc).join(',');
    });
    var csv = '﻿' + [head.map(esc).join(','), rows.join('\r\n')].join('\r\n');
    download('自助化設備狀態.csv', new Blob([csv], {type:'text/csv;charset=utf-8'}));
  }

  // ---- import (JSON / CSV / Excel) ----
  var LABEL2STATUS = {};
  ORDER.forEach(function(k){ LABEL2STATUS[STATUS[k].label] = k; });
  var STOP_CODE = { CUSS:1, SBD:1, SBG:1, KPI:1, NIL:1 };
  var CODE_RE = /^[A-Za-z]{3}$/;            // clean 3-letter code
  var CODE_STAR_RE = /^[A-Za-z]{3}\*?$/;    // code + optional * (= 經理人 KPI)

  // status from a cell that may lead with a symbol (●○▲△X) or be Chinese text.
  // returns null when unrecognized, so a merge won't overwrite an existing status.
  function statusFromText(v){
    var t = String(v==null?'':v).trim();
    if(!t) return null;
    var c = t.charAt(0);
    if(c==='●') return 'online';
    if(c==='○') return 'paused';
    if(c==='▲') return 'building';
    if(c==='△') return 'evaluating';
    if(/[Xx✕╳]/.test(c)) return 'none';
    if(LABEL2STATUS[t]) return LABEL2STATUS[t];
    if(/暫關|待重啟|暫停|暫緩/.test(t)) return 'paused';
    if(/無設備|無建置|未建置|未啟用|尚未|沒有|不適用|無規劃|^n\/?a$|^-+$|^—+$|^無$/i.test(t)) return 'none';
    if(/評估|規劃|協調|洽談|爭取|待場站|研議|討論/.test(t)) return 'evaluating';
    if(/建置|測試|進行|施工|導入|開發|安裝|認證|申請|準備|就位|待啟用/.test(t)) return 'building';
    if(/上線|啟用|已完成|完成|使用中|運作|正常|已建置|開通|已導入|✓|yes/i.test(t)) return 'online';
    return null;
  }
  // vendor text after removing a leading status glyph / newlines / KPI star
  function vendorFrom(v){
    return String(v==null?'':v).replace(/^[\s\r\n]*[●○▲△Xx✕╳]/,'').replace(/[\r\n]+/g,'').replace(/\s*\/\s*/g,'/').replace(/\*/g,'').trim();
  }
  function truthy(v){ return /^(是|有|y|yes|true|v|✓|1|●|kpi)$/i.test(String(v==null?'':v).trim()); }
  function normRegion(v){
    v=String(v).replace(/\s/g,'');
    if(/^(台灣|台湾|台湾区)$/.test(v)) return '台灣區';
    if(/^(中國|中国|中國大陸|中国大陆|大陆)$/.test(v)) return '大陸';
    return v;
  }
  function isRegionValue(v){
    v=String(v==null?'':v).replace(/\s/g,'');
    return REGION_ORDER.indexOf(normRegion(v))>=0 || /^(中國|中国|中國大陸|中国大陆|大陆|日本|韓國|韩国|南韓|南韩|南亞|南亚|美國|美国|加拿大|西歐|西欧|南歐|南欧|澳洲|大洋洲)$/.test(v);
  }

  // minimal RFC-4180 CSV parser (handles quotes, commas, CRLF, BOM)
  function parseCSV(text){
    if(text.charCodeAt(0)===0xFEFF) text = text.slice(1);
    var rows=[], row=[], cur='', inQ=false, i=0;
    while(i<text.length){
      var c=text[i];
      if(inQ){
        if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i+=2; continue; } inQ=false; i++; continue; }
        cur+=c; i++; continue;
      }
      if(c==='"'){ inQ=true; i++; continue; }
      if(c===','){ row.push(cur); cur=''; i++; continue; }
      if(c==='\r'){ i++; continue; }
      if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; i++; continue; }
      cur+=c; i++;
    }
    if(cur!==''||row.length){ row.push(cur); rows.push(row); }
    return rows.filter(function(r){ return r.some(function(c){ return String(c).trim()!==''; }); });
  }

  // ---- file readers (promise) ----
  function readTextP(file){ return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){res(String(r.result||''));}; r.onerror=function(){rej(new Error('讀取檔案失敗'));}; r.readAsText(file,'utf-8'); }); }
  function readBufP(file){ return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){res(r.result);}; r.onerror=function(){rej(new Error('讀取檔案失敗'));}; r.readAsArrayBuffer(file); }); }

  // ---- record parsers (return record arrays, don't apply) ----
  function parseJSONRecs(text){
    var arr = JSON.parse(text);
    if(!Array.isArray(arr) && arr && Array.isArray(arr.stations)) arr = arr.stations;
    if(!Array.isArray(arr)) throw new Error('JSON 內容不是場站陣列');
    return arr.filter(function(o){ return o && o.code; }).map(function(o){
      var rec={}; for(var k in o) rec[k]=o[k]; rec.code=String(o.code).trim().toUpperCase(); return rec;
    });
  }
  function parseCSVRecs(text){
    var rows = parseCSV(text);
    if(rows.length<2) return [];
    var head = rows[0].map(function(h){ return String(h).trim(); });
    var col = {}; head.forEach(function(h,i){ if(col[h]==null) col[h]=i; });
    function g(r,name){ return col[name]!=null ? r[col[name]] : ''; }
    return rows.slice(1).map(function(r){
      var code = String(g(r,'場站')||'').trim().toUpperCase();
      if(!CODE_RE.test(code)) return null;
      var rec = { code:code };
      if(g(r,'區域')!=='') rec.region = String(g(r,'區域')).trim();
      if(g(r,'建置時程')!=='') rec.phase = String(g(r,'建置時程')).trim();
      var sc=statusFromText(g(r,'CUSS')); if(sc) rec.cuss=sc;
      var sd0=statusFromText(g(r,'SBD')); if(sd0) rec.sbd=sd0;
      var sg=statusFromText(g(r,'SBG')); if(sg) rec.sbg=sg;
      if(g(r,'CUSS系統商')!=='') rec.cussVendor = String(g(r,'CUSS系統商')).trim();
      if(g(r,'SBD系統商')!=='')  rec.sbdVendor  = String(g(r,'SBD系統商')).trim();
      if(g(r,'SBG系統商')!=='')  rec.sbgVendor  = String(g(r,'SBG系統商')).trim();
      if(g(r,'CUSS時程')!=='')   rec.cussDate = String(g(r,'CUSS時程')).trim();
      if(g(r,'SBD時程')!=='')    rec.sbdDate  = String(g(r,'SBD時程')).trim();
      if(col['行李條列印']!=null) rec.bagTag = truthy(g(r,'行李條列印'));
      if(col['KPI']!=null)       rec.kpi    = truthy(g(r,'KPI'));
      var fl=+String(g(r,'航班量')).replace(/[^\d.]/g,''); if(fl) rec.flights=fl;
      var px=+String(g(r,'旅客量')).replace(/[^\d.]/g,''); if(px) rec.pax=px;
      if(g(r,'各站進度')!=='') rec.note = String(g(r,'各站進度'));
      if(g(r,'排程備註')!=='') rec.schedNote = String(g(r,'排程備註'));
      return rec;
    }).filter(Boolean);
  }

  var _xlsx = null;
  function loadXLSX(){
    if(window.XLSX) return Promise.resolve(window.XLSX);
    if(_xlsx) return _xlsx;
    _xlsx = new Promise(function(res, rej){
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload=function(){ res(window.XLSX); };
      s.onerror=function(){ rej(new Error('load failed')); };
      document.head.appendChild(s);
    });
    return _xlsx;
  }
  function colByHeader(header, names){ for(var j=0;j<header.length;j++){ if(names.indexOf(String(header[j]).trim())>=0) return j; } return -1; }
  function detectCodeCol(arr, from){
    var counts={};
    for(var r=from;r<arr.length;r++){ var row=arr[r]||[]; for(var j=0;j<row.length;j++){ var v=String(row[j]==null?'':row[j]).trim(); if(CODE_STAR_RE.test(v) && !STOP_CODE[v.replace('*','').toUpperCase()]) counts[j]=(counts[j]||0)+1; } }
    var best=-1,bn=0; for(var k in counts){ if(counts[k]>bn){ bn=counts[k]; best=+k; } } return best;
  }
  function detectRegionCol(arr, from){
    var counts={};
    for(var r=from;r<arr.length;r++){ var row=arr[r]||[]; for(var j=0;j<row.length;j++){ var v=String(row[j]==null?'':row[j]).replace(/\s/g,''); if(isRegionValue(v)) counts[j]=(counts[j]||0)+1; } }
    var best=-1,bn=0; for(var k in counts){ if(counts[k]>bn){ bn=counts[k]; best=+k; } } return best;
  }
  // parse the original EVA Excel workbooks (綜整 status sheet + CUSS 排程 sheet),
  // merged across sheets by station code. Handles ●○▲△X symbols, KPI * on the
  // code, vendor suffix, and merged region/phase cells.
  function parseWorkbook(XLSX, wb){
    var all = {};
    function rec(code){ if(!all[code]) all[code]={code:code}; return all[code]; }
    (wb.SheetNames||[]).forEach(function(name){
      var ws = wb.Sheets[name]; if(!ws) return;
      var arr = XLSX.utils.sheet_to_json(ws, { header:1, blankrows:false, defval:'' });
      if(arr.length<2) return;
      // header row = the one containing CUSS / SBG / 日期
      var hRow=-1;
      for(var i=0;i<Math.min(arr.length,8);i++){
        var hs=arr[i].map(function(c){ return String(c).trim(); });
        if(hs.indexOf('CUSS')>=0 || hs.indexOf('SBG')>=0 || hs.indexOf('日期')>=0){ hRow=i; break; }
      }
      if(hRow<0) return;   // skip sheets we don't recognise (e.g. 工作表2)
      var header = arr[hRow].map(function(c){ return String(c).trim(); });
      var isStatus = header.indexOf('SBG')>=0;                                   // 綜整
      var isSched  = !isStatus && (header.indexOf('日期')>=0 || (header.indexOf('CUSS')>=0 && header.indexOf('備註')>=0));
      if(!isStatus && !isSched) return;
      var cCUSS=colByHeader(header,['CUSS']), cSBD=colByHeader(header,['SBD']), cSBG=colByHeader(header,['SBG']);
      var cNote=colByHeader(header, isStatus?['各站進度','說明','備註']:['備註','排程備註','排程說明']);
      var cPhase=colByHeader(header,['日期']);
      var codeCol=detectCodeCol(arr,hRow+1), regionCol=detectRegionCol(arr,hRow+1);
      var carryRegion='', carryPhase='';
      for(var r=hRow+1;r<arr.length;r++){
        var row=arr[r]||[];
        if(regionCol>=0){ var rv=String(row[regionCol]==null?'':row[regionCol]).replace(/\s/g,''); if(rv && isRegionValue(rv)) carryRegion=normRegion(rv); }
        if(cPhase>=0){ var pv=String(row[cPhase]==null?'':row[cPhase]).replace(/\s/g,''); if(pv) carryPhase=pv; }
        var rawc = codeCol>=0 ? String(row[codeCol]==null?'':row[codeCol]).trim() : '';
        if(!CODE_STAR_RE.test(rawc) || STOP_CODE[rawc.replace('*','').toUpperCase()]){
          rawc='';
          for(var j=0;j<row.length;j++){ var vv=String(row[j]==null?'':row[j]).trim(); if(CODE_STAR_RE.test(vv) && !STOP_CODE[vv.replace('*','').toUpperCase()]){ rawc=vv; break; } }
        }
        if(!CODE_STAR_RE.test(rawc)) continue;
        var code=rawc.replace('*','').toUpperCase();
        if(STOP_CODE[code]) continue;
        var R=rec(code);
        if(rawc.indexOf('*')>=0) R.kpi=true;
        if(carryRegion) R.region=carryRegion;
        if(isStatus){
          if(cCUSS>=0){ var s1=statusFromText(row[cCUSS]); if(s1){ R.cuss=s1; var v1=vendorFrom(row[cCUSS]); if(v1) R.cussVendor=v1; } }
          if(cSBD>=0){ var s2=statusFromText(row[cSBD]); if(s2){ R.sbd=s2; var v2=vendorFrom(row[cSBD]); if(v2) R.sbdVendor=v2; } }
          if(cSBG>=0){ var s3=statusFromText(row[cSBG]); if(s3){ R.sbg=s3; var v3=vendorFrom(row[cSBG]); if(v3) R.sbgVendor=v3; } }
          if(cNote>=0){ var nt=String(row[cNote]==null?'':row[cNote]).trim(); if(nt) R.note=nt; }
        }else{
          if(PHASES.indexOf(carryPhase)>=0) R.phase=carryPhase;
          if(cCUSS>=0){ var cd=String(row[cCUSS]==null?'':row[cCUSS]).trim(); if(cd) R.cussDate=cd; }
          if(cSBD>=0){ var sd=String(row[cSBD]==null?'':row[cSBD]).trim(); if(sd) R.sbdDate=sd; }
          if(cNote>=0){ var sn=String(row[cNote]==null?'':row[cNote]).trim(); if(sn) R.schedNote=sn; }
        }
      }
    });
    return Object.keys(all).map(function(c){ return all[c]; });
  }

  // parse one file → { recs, label, kind } ('full' replaces, 'partial' merges)
  function parseFileToRecords(file){
    var name=(file.name||'').toLowerCase();
    if(/\.json$/.test(name)) return readTextP(file).then(function(t){ return { recs:parseJSONRecs(t), label:'JSON（'+file.name+'）', kind:'full' }; });
    if(/\.csv$/.test(name))  return readTextP(file).then(function(t){ return { recs:parseCSVRecs(t), label:'CSV（'+file.name+'）', kind:'full' }; });
    if(/\.(xlsx|xlsm|xls)$/.test(name)) return loadXLSX().then(function(XLSX){
      return readBufP(file).then(function(buf){ var wb=XLSX.read(new Uint8Array(buf),{type:'array'}); return { recs:parseWorkbook(XLSX,wb), label:'Excel（'+file.name+'）', kind:'partial' }; });
    }).catch(function(err){ if(err && /load failed/.test(err.message)) throw new Error('無法載入 Excel 解析元件（需連線）；離線請改用 JSON／CSV'); throw err; });
    throw new Error('不支援的檔案格式：'+file.name);
  }
  // merge multiple record lists by station code (so 綜整＋排程 combine per station)
  function combineRecs(list){
    var by={};
    list.forEach(function(r){ if(!r||!r.code) return; var c=r.code; if(!by[c]) by[c]={code:c}; for(var k in r){ if(k==='code') continue; var v=r[k]; if(v==null||v==='') continue; by[c][k]=v; } });
    return Object.keys(by).map(function(c){ return by[c]; });
  }

  // apply parsed records — replace (single JSON/CSV) or merge-by-code
  function applyImport(recs, mode, srcLabel){
    if(!recs || !recs.length){ window.alert('未從 '+srcLabel+' 解析到任何場站資料。'); return; }
    var msg = mode==='replace'
      ? '已從 '+srcLabel+' 解析 '+recs.length+' 個場站。\n\n要「取代」目前 '+state.stations.length+' 個場站嗎？（現有資料將被覆蓋，可用「重設」還原）'
      : '已從 '+srcLabel+' 解析 '+recs.length+' 個場站。\n\n要「合併更新」至目前資料嗎？（相同場站代碼更新其欄位，新代碼則新增）';
    if(!window.confirm(msg)) return;
    var stations, added=0, updated=0;
    if(mode==='replace'){
      nid=1;
      stations = recs.map(function(r){ var o=normalize(r); o.id=nid++; return o; });
    }else{
      stations = state.stations.map(function(s){ var n={}; for(var k in s) n[k]=s[k]; return n; });
      var idxByCode={}; stations.forEach(function(s,i){ idxByCode[s.code]=i; });
      var maxId=stations.reduce(function(m,s){ return Math.max(m, s.id||0); }, 0); nid=maxId+1;
      recs.forEach(function(r){
        if(idxByCode[r.code]!=null){
          var tgt=stations[idxByCode[r.code]];
          for(var k in r){ if(k==='code') continue; var v=r[k]; if(v==null||v==='') continue; tgt[k]=v; }
          // imported notes are authoritative → re-derive 行李條 icon
          if(r.note!=null || r.schedNote!=null) tgt.bagTag = deriveBagTag(tgt.note, tgt.schedNote);
          var nn=normalize(tgt); nn.id=tgt.id; stations[idxByCode[r.code]]=nn; updated++;
        }else{
          var o=normalize(r); o.id=nid++; stations.push(o); idxByCode[o.code]=stations.length-1; added++;
        }
      });
    }
    save(stations); state.stations=stations; state.selectedId=null;
    state.filters={ region:'all', cuss:'all', sbd:'all', sbg:'all', kpi:'all', excluded:{} };
    state.pickerOpen=false;
    logEvent('匯入資料（'+srcLabel+'）：'+(mode==='replace'?('取代為 '+stations.length+' 站'):('更新 '+updated+' 站、新增 '+added+' 站，共 '+stations.length+' 站')));
    render();
    window.alert('匯入完成：目前共 '+stations.length+' 個場站'+(mode==='merge'?('（更新 '+updated+'、新增 '+added+'）'):'')+'。');
  }
  // multi-select: JSON/CSV single → replace; anything else (incl. multiple files
  // or Excel) → merge combined records by station code.
  function importData(){
    var inp=document.createElement('input');
    inp.type='file'; inp.multiple=true;
    inp.accept='.json,.csv,.xlsx,.xlsm,.xls,application/json,text/csv';
    inp.onchange=function(){
      var files=inp.files ? [].slice.call(inp.files) : [];
      if(!files.length) return;
      Promise.all(files.map(parseFileToRecords)).then(function(results){
        results = results.filter(Boolean);
        if(!results.length){ window.alert('未能從所選檔案解析出場站資料。'); return; }
        if(results.length===1 && results[0].kind==='full'){
          applyImport(results[0].recs, 'replace', results[0].label);
        }else{
          var combined = combineRecs(results.reduce(function(a,r){ return a.concat(r.recs||[]); }, []));
          applyImport(combined, 'merge', results.map(function(r){ return r.label; }).join(' + '));
        }
      }).catch(function(err){ window.alert('匯入失敗：'+((err&&err.message)||err)); });
    };
    inp.click();
  }

  var _h2c = null;
  function loadH2C(){
    if(window.html2canvas) return Promise.resolve(window.html2canvas);
    if(_h2c) return _h2c;
    _h2c = new Promise(function(res, rej){
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = function(){ res(window.html2canvas); };
      s.onerror = function(){ rej(new Error('load failed')); };
      document.head.appendChild(s);
    });
    return _h2c;
  }
  function exportPNG(targetId, filename){
    var el = document.getElementById(targetId || 'cuss-board');
    if(!el) return;
    // higher-resolution export: target ~4× device pixels, but cap the scale so the
    // output stays within the browser's max canvas dimension (~16384px).
    var rect = el.getBoundingClientRect();
    var MAX_DIM = 16384;
    var want = Math.max(4, Math.ceil((window.devicePixelRatio || 1) * 2));
    var fit = Math.floor(MAX_DIM / Math.max(rect.width || 1, rect.height || 1));
    var scale = Math.max(2, Math.min(want, fit || want));
    loadH2C().then(function(h2c){
      return h2c(el, { scale:scale, backgroundColor:'#ffffff', useCORS:true, logging:false,
                       ignoreElements:function(node){ return node.getAttribute && node.getAttribute('data-noshot')==='1'; } }).then(function(canvas){
        canvas.toBlob(function(b){ if(b) download(filename || '自助化設備儀表板.png', b); }, 'image/png');
      });
    }).catch(function(){
      window.alert('圖片匯出失敗（可能無法連線載入匯出元件），請改用匯出 JSON／CSV 功能。');
    });
  }

  // ---- derive coverage ----
  function countBy(list, f){
    var c = {online:0,paused:0,building:0,evaluating:0,none:0};
    list.forEach(function(s){ if(c[s[f]]!=null) c[s[f]]++; });
    return c;
  }
  function stage(list, n, code, desc, f){
    var total = list.length || 1;
    var c = countBy(list, f);
    var pct = Math.round((c.online/total)*100);
    var segs = ORDER.filter(function(k){ return c[k]>0; }).map(function(k){
      var w = (c[k]/total)*100;
      return { w:+w.toFixed(2), color:STATUS[k].color, textOn:STATUS[k].textOn, label: w>=6 ? String(c[k]) : '' };
    });
    var legend = ORDER.map(function(k){ return { color:STATUS[k].color, mark:STATUS[k].mark, text:c[k], label:STATUS[k].label }; });
    var onlineList = list.filter(function(s){ return s[f]==='online'; });
    return { n:n, code:code, desc:desc, pctLabel: pct+'%', online:c.online, segs:segs, legend:legend, onlineList:onlineList };
  }

  var phaseDot = {
    '2025前':STATUS.online.color, '2026/Q1':STATUS.online.color, '2026/Q2':STATUS.online.color,
    '2026/Q3':STATUS.building.color, '2026/Q4':STATUS.building.color, '暫定2027':STATUS.evaluating.color,
    '未排程':STATUS.none.color
  };

  // ---- scoring for map & matrix ----
  // ---- CUSS/SBD/SBG online-combination categories (inclusive) ----
  // a station counts toward a combo if ALL listed stages are 已上線 (online),
  // regardless of the others — e.g. CUSS＋SBD also includes all-three stations
  var COMBOS = [
    { key:'all',  label:'CUSS｜SBD｜SBG皆已上線', title:'CUSS+SBD+SBG', sdesc:'三項自助皆已上線', req:['cuss','sbd','sbg'] },
    { key:'cs',   label:'CUSS＋SBD',    title:'CUSS+SBD', sdesc:'CUSS 與 SBD 皆已上線', req:['cuss','sbd'] },
    { key:'cg',   label:'僅CUSS＋SBG',  title:'僅CUSS+SBG', sdesc:'僅 CUSS 與 SBG 已上線（未含 SBD）', req:['cuss','sbg'], not:['sbd'] },
    { key:'sg',   label:'SBD＋SBG',     title:'SBD+SBG', sdesc:'SBD 與 SBG 皆已上線', req:['sbd','sbg'] },
    { key:'c',    label:'CUSS',         title:'CUSS', sdesc:'CUSS 已上線', req:['cuss'] },
    { key:'s',    label:'SBD',          title:'SBD', sdesc:'SBD 已上線', req:['sbd'] },
    { key:'g',    label:'SBG',          title:'SBG', sdesc:'SBG 已上線', req:['sbg'] },
    { key:'none', label:'CUSS｜SBD｜SBG皆未上線', title:'皆未上線', sdesc:'三項自助皆未上線', req:[] }
  ];
  function comboMatch(s, combo){
    if(combo.key==='none') return s.cuss!=='online' && s.sbd!=='online' && s.sbg!=='online';
    // req stages must be online; any `not` stages must NOT be online (exclusive/「僅」)
    var reqOk = combo.req.every(function(st){ return s[st]==='online'; });
    var notOk = (combo.not||[]).every(function(st){ return s[st]!=='online'; });
    return reqOk && notOk;
  }
  function comboCounts(){
    var c = {}; COMBOS.forEach(function(o){ c[o.key]=0; });
    liveStations().forEach(function(s){ COMBOS.forEach(function(o){ if(comboMatch(s,o)) c[o.key]++; }); });
    return c;
  }

  var STATUS_WEIGHT = { online:1, paused:0.55, building:0.45, evaluating:0.2, none:0 };
  // CUSS/SBD weighted higher than SBG (sums to 1 so the score stays 0–1)
  var STAGE_WEIGHT = { cuss:0.45, sbd:0.45, sbg:0.10 };
  function automationScore(s){
    return STATUS_WEIGHT[s.cuss]*STAGE_WEIGHT.cuss + STATUS_WEIGHT[s.sbd]*STAGE_WEIGHT.sbd + STATUS_WEIGHT[s.sbg]*STAGE_WEIGHT.sbg;
  }
  // ---- matrix X-axis volume position (outlier-robust log scale) ----
  // A single mega-hub (TPE ≈ 231k pax, ~12× the next station) stretches a plain
  // log axis so far that every other station collapses into the left third while
  // a wide empty band opens up in front of the outlier. To keep dots ordered by
  // true scale yet spread evenly, each station's X position blends two views of
  // the currently-visible set:
  //   • log position — ln(pax) normalized to the set's [min,max]; preserves the
  //     real proportional distance between stations.
  //   • rank position — the station's quantile within the set; inherently even
  //     and immune to outliers (TPE is simply "the largest", not "12× the axis").
  // The blend stays strictly monotonic (larger pax ⇒ further right, always), so
  // ordering is correct, while the rank term fills the gap an outlier would leave
  // and rebalances the four quadrants. Recomputed per set, so the axis still
  // rescales to whatever is currently visible/filtered.
  function paxScale(list){
    var sorted = (list||[]).map(function(s){ return Math.log(Math.max(1, +s.pax||0)); })
                           .sort(function(a,b){ return a-b; });
    var lo, hi;
    if(sorted.length){ lo = sorted[0]; hi = sorted[sorted.length-1]; }
    else { lo = Math.log(500); hi = Math.log(250000); }
    return { lo:lo, hi:hi, sorted:sorted };
  }
  // weight of the log term in the blend (0 = pure rank/even, 1 = pure log);
  // 0.4 keeps a clear sense of proportional scale while spreading dots evenly.
  var VOL_LOG_WEIGHT = 0.4;
  function volumeScoreIn(s, scale){
    var v = Math.log(Math.max(1, +s.pax||0));
    var lg = (scale.hi - scale.lo < 1e-9) ? 0.5 : (v - scale.lo) / (scale.hi - scale.lo);
    var arr = scale.sorted || [], n = arr.length, rk = 0.5;
    if(n > 1){
      var less = 0, equal = 0;
      for(var i=0;i<n;i++){ if(arr[i] < v) less++; else if(arr[i] === v) equal++; }
      // midrank so tied volumes share a quantile; normalized to [0,1]
      rk = (less + (equal > 1 ? (equal - 1) / 2 : 0)) / (n - 1);
    }
    return Math.max(0, Math.min(1, VOL_LOG_WEIGHT * lg + (1 - VOL_LOG_WEIGHT) * rk));
  }
  function volumeScore(s){ return volumeScoreIn(s, paxScale(liveStations())); }
  var AUTO_THRESHOLD = 0.5, VOL_THRESHOLD = 0.5;
  // quadrants keyed by (hiVol, hiAuto)
  var QUAD = {
    matureLow:  { name:'成熟場站',   color:'#00853C', tint:'#EAF3EE', desc:'設備完整，可作為服務 2.0 示範站', icon:'bars' },
    priority:   { name:'重點場站', color:'#EE7623', tint:'#FCEEE2', desc:'航班量大、旅客量大、櫃台壓力高，將持續最佳化旅客流程', icon:'star' },
    limited:    { name:'限制型場站', color:'#C79A2E', tint:'#F7F1E0', desc:'受限機場設施、空間或 GHA 作業模式', icon:'warn' },
    progress:   { name:'進行中場站', color:'#3F9E86', tint:'#E6F1EE', desc:'已有部分自助功能，仍需補足行李、證件或付款流程', icon:'refresh' }
  };
  function quadrantOf(s){
    var hiV = volumeScore(s) >= VOL_THRESHOLD;
    var hiA = automationScore(s) >= AUTO_THRESHOLD;
    if(hiA && !hiV) return QUAD.matureLow;
    if(hiA && hiV)  return QUAD.priority;
    if(!hiA && !hiV) return QUAD.limited;
    return QUAD.progress;
  }

  // priority tier (1 = leftmost / highest):
  //  1 CUSS｜SBD｜SBG完備 + CUSS 列印行李條   2 CUSS+SBD 完備 + CUSS 列印行李條
  //  3 CUSS｜SBD｜SBG完備                     4 CUSS/SBD 完備      5 其餘（原始規則）
  function tierRank(s){
    var allThree = s.cuss==='online' && s.sbd==='online' && s.sbg==='online';
    var cussSbd  = s.cuss==='online' && s.sbd==='online';
    var bag = !!s.bagTag;
    if(allThree && bag) return 1;
    if(cussSbd && bag)  return 2;
    if(allThree)        return 3;
    if(cussSbd)         return 4;
    return 5;
  }
  // order chips left→right: priority tier first, then the original rule
  // (automation completeness high→low, then CUSS status, then code)
  function byAutomation(a, b){
    var t = tierRank(a) - tierRank(b);
    if(t) return t;
    var d = automationScore(b) - automationScore(a);
    if(Math.abs(d) > 1e-9) return d;
    var c = STATUS_WEIGHT[b.cuss] - STATUS_WEIGHT[a.cuss];
    if(c) return c;
    return (a.code||'').localeCompare(b.code||'');
  }
  function phaseIndex(s){ var i = PHASES.indexOf(s.phase); return i<0 ? PHASES.length : i; }
  // region view: order by build schedule first, then the completeness tier rule
  function byPhaseThenAuto(a, b){
    var d = phaseIndex(a) - phaseIndex(b);
    if(d) return d;
    return byAutomation(a, b);
  }
  function groupList(){
    var pool = liveStations();
    if(state.groupMode==='region'){
      var regs = REGION_ORDER.filter(function(r){ return pool.some(function(s){ return s.region===r; }); });
      pool.forEach(function(s){ if(s.region && regs.indexOf(s.region)<0) regs.push(s.region); });
      // stations with empty region
      if(pool.some(function(s){ return !s.region; })) regs.push('');
      return regs.map(function(r){
        return { name: r || '未分區', dot:'#00853C', items: pool.filter(function(s){ return (s.region||'')===r; }).sort(byPhaseThenAuto) };
      });
    }
    return PHASES.map(function(p){
      return { name:p, dot:phaseDot[p]||STATUS.evaluating.color, items: pool.filter(function(s){ return s.phase===p; }).sort(byAutomation) };
    });
  }
  function groupHTML(g){
    return '<div style="display:flex;gap:16px;padding:12px 0;border-bottom:1px dashed #E4EBE6">'
      + '<div style="flex:none;width:96px;display:flex;flex-direction:column;gap:2px;padding-top:2px">'

  // ---- map ----
  var MW = 1000, MH = 500;
  function mproj(lat, lon){ return { x:(lon+180)/360*MW, y:(90-lat)/180*MH }; }
  // Split the original basemap at its own closed white-line boundaries. Each
  // subpath is moved intact: no longitude/latitude remap and no shape distortion.
  var MAP_PIECES=null, STATION_PLATE_CACHE={};
  function mapPathPoints(d){
    var out=[], re=/(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/g,m;
    while((m=re.exec(d))) out.push({x:+m[1],y:+m[2]});
    return out;
  }
  function polygonArea(poly){
    var a=0; for(var i=0,j=poly.length-1;i<poly.length;j=i++) a+=poly[j].x*poly[i].y-poly[i].x*poly[j].y;
    return Math.abs(a/2);
  }
  function pointInPolygon(p,poly){
    var yes=false;
    for(var i=0,j=poly.length-1;i<poly.length;j=i++){
      var a=poly[i],b=poly[j];
      if(((a.y>p.y)!==(b.y>p.y)) && p.x<(b.x-a.x)*(p.y-a.y)/((b.y-a.y)||1e-9)+a.x) yes=!yes;
    }
    return yes;
  }
  function distanceToPolygon(p,poly){
    var best=Infinity;
    for(var i=0,j=poly.length-1;i<poly.length;j=i++){
      var a=poly[j],b=poly[i],vx=b.x-a.x,vy=b.y-a.y;
      var t=Math.max(0,Math.min(1,((p.x-a.x)*vx+(p.y-a.y)*vy)/(vx*vx+vy*vy||1)));
      var dx=p.x-(a.x+t*vx),dy=p.y-(a.y+t*vy); best=Math.min(best,Math.sqrt(dx*dx+dy*dy));
    }
    return best;
  }
  function transformedPieceGeometry(piece,cx,cy,fx,fy,scale){
    var s=scale||1,x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    var poly=piece.poly.map(function(p){
      var q={x:fx+(p.x-cx)*s,y:fy+(p.y-cy)*s};
      x0=Math.min(x0,q.x);x1=Math.max(x1,q.x);y0=Math.min(y0,q.y);y1=Math.max(y1,q.y);return q;
    });
    return{poly:poly,box:{x0:x0,y0:y0,x1:x1,y1:y1}};
  }
  function orient2d(a,b,c){return(b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x);}
  function segmentsProperlyCross(a,b,c,d){
    var e=1e-7,o1=orient2d(a,b,c),o2=orient2d(a,b,d),o3=orient2d(c,d,a),o4=orient2d(c,d,b);
    return((o1>e&&o2<-e)||(o1<-e&&o2>e))&&((o3>e&&o4<-e)||(o3<-e&&o4>e));
  }
  // Boundary contact is permitted; positive-area overlap is not.
  function polygonsOverlapStrict(a,b){
    var e=.015,A=a.box,B=b.box;
    if(Math.min(A.x1,B.x1)-Math.max(A.x0,B.x0)<=e||Math.min(A.y1,B.y1)-Math.max(A.y0,B.y0)<=e) return false;
    var ap=a.poly,bp=b.poly;
    for(var i=0,ip=ap.length-1;i<ap.length;ip=i++)for(var j=0,jp=bp.length-1;j<bp.length;jp=j++)
      if(segmentsProperlyCross(ap[ip],ap[i],bp[jp],bp[j])) return true;
    for(i=0;i<ap.length;i++)if(pointInPolygon(ap[i],bp)&&distanceToPolygon(ap[i],bp)>e) return true;
    for(i=0;i<bp.length;i++)if(pointInPolygon(bp[i],ap)&&distanceToPolygon(bp[i],ap)>e) return true;
    return false;
  }
  function visualMacrosOverlap(a,b,gap){
    var g=gap||0,i,j,ca,cb;
    for(i=0;i<a.circles.length;i++)for(j=0;j<b.circles.length;j++){
      ca=a.circles[i];cb=b.circles[j];
      if(Math.hypot(ca.x-cb.x,ca.y-cb.y)<ca.r+cb.r+g) return true;
    }
    for(i=0;i<a.polygons.length;i++)for(j=0;j<b.polygons.length;j++)
      if(polygonsOverlapStrict(a.polygons[i],b.polygons[j])) return true;
    return false;
  }
  function getMapPieces(){
    if(MAP_PIECES) return MAP_PIECES;
    MAP_PIECES=[];
    MAPCONT.forEach(function(cont,ci){
      var sub=cont.p.match(/M[^Z]*Z/g)||[];
      sub.forEach(function(d,si){
        var poly=mapPathPoints(d); if(poly.length<3) return;
        var x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
        poly.forEach(function(p){x0=Math.min(x0,p.x);x1=Math.max(x1,p.x);y0=Math.min(y0,p.y);y1=Math.max(y1,p.y);});
        MAP_PIECES.push({id:ci+':'+si,continent:cont.c,d:d,poly:poly,area:polygonArea(poly),box:{x0:x0,y0:y0,x1:x1,y1:y1}});
      });
    });
    return MAP_PIECES;
  }
  function stationMapPiece(code,p,pieces){
    var key=(code||'')+'|'+p.x.toFixed(2)+'|'+p.y.toFixed(2);
    if(STATION_PLATE_CACHE[key]) return STATION_PLATE_CACHE[key];
    var inside=[];
    pieces.forEach(function(piece){ if(pointInPolygon(p,piece.poly)) inside.push(piece); });
    inside.sort(function(a,b){return a.area-b.area;});
    var chosen=inside[0];
    if(!chosen){
      var best=Infinity;
      pieces.forEach(function(piece){var d=distanceToPolygon(p,piece.poly);if(d<best){best=d;chosen=piece;}});
    }
    STATION_PLATE_CACHE[key]=chosen; return chosen;
  }
  // Movement groups are driven by the station's region setting first. The
  // requested joint plates keep North America, Europe, and China/India intact;
  // the broad Northeast Asia region remains split into Japan and Korea.
  var PLATE_GROUPS=[
    {id:'north_america',label:'美國／加拿大',codes:['YYZ','YVR','ORD','DFW','IAH','LAX','JFK','SEA','SFO','IAD']},
    {id:'europe',label:'歐洲',codes:['LHR','AMS','CDG','MUC','MXP','VIE'],targetZone:'upper_middle'},
    {id:'southeast_asia',label:'東南亞',codes:['DPS','CGK','KTI','KUL','CEB','CRK','MNL','SIN','BKK','CNX','DAD','HAN','SGN']},
    {id:'china',label:'中國大陸／印度',codes:['PEK','CAN','TFU','HGH','PVG','SHA','SZX','XMN','HKG','MFM','DEL']},
    {id:'taiwan',label:'台灣',codes:['KHH','TPE','TSA']},
    {id:'korea',label:'韓國',codes:['PUS','GMP','ICN']},
    {id:'japan',label:'日本',codes:['AOJ','FUK','KMQ','MYJ','OKA','KIX','UKB','SDJ','CTS','HND','NRT']},
    {id:'oceania',label:'大洋洲',codes:['BNE'],targetZone:'lower_middle'}
  ];
  var PLATE_GROUP_BY_ID={},PLATE_GROUP_BY_CODE={},MAP_GROUP_PIECES=null;
  PLATE_GROUPS.forEach(function(g){PLATE_GROUP_BY_ID[g.id]=g;g.codes.forEach(function(c){PLATE_GROUP_BY_CODE[c]=g;});});
  function normalizedRegion(v){return String(v||'').replace(/\s/g,'').toLowerCase();}
  function stationPlateGroup(s,geoPiece){
    var r=normalizedRegion(s.region),code=String(s.code||'').toUpperCase(),id='';
    if(/^(中國|中国|大陸|大陆|中國大陸|中国大陆|港澳)$/.test(r)) id='china';
    else if(/^(台灣|台湾|台灣區|台湾区)$/.test(r)) id='taiwan';
    else if(/^(日本)$/.test(r)) id='japan';
    else if(/^(韓國|韩国|南韓|南韩)$/.test(r)) id='korea';
    else if(/^(南亞|南亚|印度)$/.test(r)) id='china';
    else if(/^(東南亞|东南亚)$/.test(r)) id='southeast_asia';
    else if(/^(紐澳|纽澳|澳紐|澳纽|澳洲|大洋洲)$/.test(r)) id='oceania';
    else if(/^(美國|美国|usa|us|加拿大|canada)$/.test(r)) id='north_america';
    else if(/^(西歐|西欧|westerneurope|南歐|南欧|southerneurope)$/.test(r)) id='europe';
    else if(r==='美洲') id='north_america';
    else if(r==='歐洲'||r==='欧洲') id='europe';
    else if(r==='東北亞'||r==='东北亚') id=(code==='PUS'||code==='GMP'||code==='ICN')?'korea':'japan';
    if(!id&&PLATE_GROUP_BY_CODE[code]) id=PLATE_GROUP_BY_CODE[code].id;
    if(id) return PLATE_GROUP_BY_ID[id];
    return{id:'geo:'+(geoPiece?geoPiece.id:(s.id||code)),label:s.region||'其他場站',codes:[code],fallback:true};

  // Snap matrix dots onto a tidy grid: each dot takes the free cell nearest its
  // ideal (volume, automation) position, so dots never overlap yet stay ordered.
  function gridSnapMatrix(items){
    var COLS=14, ROWS=12, MX=4, SPAN=92, occ={};
    items.sort(function(a,b){ return (b.s.pax||0)-(a.s.pax||0); });   // hubs claim their cell first
    items.forEach(function(m){
      var c0=Math.round(m.fx*(COLS-1)), r0=Math.round((1-m.fy)*(ROWS-1)), best=null;
      for(var rad=0; rad<COLS+ROWS && !best; rad++){
        var bd=Infinity, bc=null;
        for(var dc=-rad;dc<=rad;dc++)for(var dr=-rad;dr<=rad;dr++){
          if(Math.max(Math.abs(dc),Math.abs(dr))!==rad) continue;
          var c=c0+dc, r=r0+dr;
          if(c<0||c>=COLS||r<0||r>=ROWS||occ[c+'_'+r]) continue;
          var dd=dc*dc*1.15+dr*dr;   // slight horizontal-spread preference
          if(dd<bd){ bd=dd; bc={c:c,r:r}; }
        }
        if(bc) best=bc;
      }
      if(!best) best={c:c0,r:r0};
      occ[best.c+'_'+best.r]=1;
      m.left = MX + (best.c+0.5)/COLS*SPAN;
      m.top  = MX + (best.r+0.5)/ROWS*SPAN;
    });
  }

      +   '<div style="display:flex;align-items:center;gap:6px;flex:none"><span style="font-size:11px;font-weight:700;color:#515A5D;white-space:nowrap">圓圈大小</span>'
      +     '<input type="range" min="0.05" max="2.6" step="0.05" value="'+state.dotScale+'" data-dotsize style="width:78px;accent-color:#00853C;cursor:pointer" />'
      +     '<span style="font-size:11px;color:#8A938F;min-width:30px">'+Math.round(state.dotScale*100)+'%</span>'
      +   '</div>'
      +   '<div style="display:flex;align-items:center;gap:6px;flex:none"><span style="font-size:11px;font-weight:700;color:#515A5D;white-space:nowrap">場站名稱字級</span>'
      +     '<input type="range" min="0.05" max="2.4" step="0.05" value="'+state.mapNameScale+'" data-mapnamesize style="width:78px;accent-color:#00853C;cursor:pointer" />'
      +     '<span style="font-size:11px;color:#8A938F;min-width:30px">'+Math.round(state.mapNameScale*100)+'%</span>'

  function filterBarHTML(){
    var statusOpts = [{v:'all',label:'全部'}].concat(ORDER.map(function(k){ return {v:k, label:STATUS[k].mark+' '+STATUS[k].label}; }));
    var regions = REGION_ORDER.filter(function(r){ return state.stations.some(function(s){ return s.region===r; }); });
    state.stations.forEach(function(s){ if(s.region && regions.indexOf(s.region)<0) regions.push(s.region); });
    var regionOpts = [{v:'all',label:'全部區域'}].concat(regions.map(function(r){ return {v:r, label:r}; }));
    var kpiOpts = [{v:'all',label:'全部'},{v:'yes',label:'僅 KPI 場站'},{v:'no',label:'非 KPI'}];
    var clrOn = filtersActive();
    var clearBtn = '<button data-action="clearFilters"'+(clrOn?'':' disabled')+' style="flex:none;white-space:nowrap;border:1px solid '+(clrOn?'#DFE3E4':'#ECEFEF')+';background:#fff;color:'+(clrOn?'#C24626':'#C7CDCF')+';border-radius:14px;padding:5px 12px;font-size:12px;font-weight:600;cursor:'+(clrOn?'pointer':'default')+'">清除篩選</button>';
    var exN = excludedCount();
    var pickerBtn = '<button data-action="togglePicker" style="flex:none;white-space:nowrap;border:1px solid '+(state.pickerOpen||exN>0?'#00853C':'#DFE3E4')+';background:'+(state.pickerOpen?'#00853C':'#fff')+';color:'+(state.pickerOpen?'#fff':(exN>0?'#00853C':'#515A5D'))+';border-radius:14px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer">個別場站'+(exN>0?'（已排除 '+exN+'）':'')+' '+(state.pickerOpen?'▲':'▾')+'</button>';
    return '<div style="display:flex;flex-wrap:nowrap;align-items:center;gap:10px;background:#fff;border:1px solid #DFE3E4;border-radius:12px;padding:12px 16px;margin-bottom:14px;overflow-x:auto">'
      + '<span style="flex:none;font-size:12px;font-weight:800;color:#00853C">篩選</span>'
      + filterSelect('region','場站區域',regionOpts)
      + filterSelect('cuss','CUSS',statusOpts)
      + filterSelect('sbd','SBD',statusOpts)
      + filterSelect('sbg','SBG',statusOpts)
      + filterSelect('kpi','經理人 KPI',kpiOpts)
      + pickerBtn
      + clearBtn
      + '</div>';
  }
  function pickerHTML(){
    if(!state.pickerOpen) return '';
    var e = state.filters.excluded;
    var regions = REGION_ORDER.filter(function(r){ return state.stations.some(function(s){ return s.region===r; }); });
    state.stations.forEach(function(s){ if(s.region && regions.indexOf(s.region)<0) regions.push(s.region); });
    if(state.stations.some(function(s){ return !s.region; })) regions.push('');
    var groups = regions.map(function(r){
      var items = state.stations.filter(function(s){ return (s.region||'')===r; });
      if(!items.length) return '';
      var chips = items.map(function(s){
        var off = !!e[s.id];
        return '<button data-action="toggleExclude" data-id="'+s.id+'" title="'+esc(s.code)+(off?'（已排除）':'')+'" style="border:1.5px solid '+(off?'#E0E4E5':STATUS[s.cuss].color)+';background:'+(off?'#F2F4F4':'#fff')+';color:'+(off?'#AEB6B8':'#141819')+';border-radius:7px;padding:4px 9px;font-size:11.5px;font-weight:700;letter-spacing:.5px;cursor:pointer;'+(off?'text-decoration:line-through':'')+'"><span style="display:inline-block;width:7px;height:7px;border-radius:2px;background:'+(off?'#CDD3D4':STATUS[s.cuss].color)+';margin-right:5px;vertical-align:middle"></span>'+esc(s.code)+'</button>';
      }).join('');
      return '<div style="display:flex;flex-direction:column;gap:6px;min-width:0">'
        + '<div style="font-size:11px;font-weight:700;color:#6E787B">'+esc(r||'未分區')+'</div>'
        + '<div style="display:flex;flex-wrap:wrap;gap:6px">'+chips+'</div>'
        + '</div>';
    }).join('');
    return '<div id="station-picker" style="background:#fff;border:1px solid #DFE3E4;border-radius:12px;padding:14px 16px;margin-bottom:14px">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px">'
      +   '<div style="font-size:12px;font-weight:800;color:#00853C">個別場站選取<span style="font-weight:400;color:#8A938F">　點場站代碼可加入／移除；灰色刪除線＝已排除，不納入地圖與矩陣　·　點空白處收合</span></div>'
      +   '<div style="display:flex;gap:6px">'
      +     '<button data-action="pickAll" style="border:1px solid #DFE3E4;background:#fff;color:#00853C;border-radius:12px;padding:4px 11px;font-size:11.5px;font-weight:600;cursor:pointer">全選</button>'
      +     '<button data-action="pickNone" style="border:1px solid #DFE3E4;background:#fff;color:#515A5D;border-radius:12px;padding:4px 11px;font-size:11.5px;font-weight:600;cursor:pointer">全不選</button>'
      +   '</div>'
      + '</div>'
      + '<div style="display:flex;flex-wrap:wrap;gap:16px 22px">'+groups+'</div>'
      + '</div>';
  }
  function mapBodyHTML(){
    return '<div>'
      + filterBarHTML()
      + pickerHTML()
      + '<div id="cuss-board" style="display:flex;gap:18px;align-items:stretch">'
      +   mapPanelHTML() + matrixHTML()
      + '</div>'
      + '</div>';
  }

  // ---- tooltip ----
  var tip = document.getElementById('tip');
  function tipRow(lbl, s, statusField, vendorField, dateField){
    var st = STATUS[s[statusField]];
    var extra = [];
    if(s[vendorField]) extra.push('系統商 '+esc(s[vendorField]));
    if(dateField && s[dateField]) extra.push(esc(s[dateField]));
    var tail = extra.length ? ' <span style="color:#9DB3A8">· '+extra.join(' · ')+'</span>' : '';
    return '<div style="display:flex;align-items:center;gap:6px;margin-top:3px"><span style="width:8px;height:8px;border-radius:2px;background:'+st.color+';flex:none"></span><b style="width:30px;display:inline-block">'+lbl+'</b>'+st.label+tail+'</div>';
  }
  function showTip(s, x, y){
    var head = '<div style="font-size:14px;font-weight:800;letter-spacing:.5px">'+esc(s.code)
      + (s.kpi?' <span style="font-size:9px;color:#8FE3B6;border:1px solid #8FE3B6;border-radius:6px;padding:0 4px;vertical-align:middle">KPI</span>':'')
      + (s.bagTag?' <span style="font-size:9px;color:#EAD7A0;border:1px solid #EAD7A0;border-radius:6px;padding:0 4px;vertical-align:middle">行李條</span>':'')
      + '</div>'
      + '<div style="font-size:10.5px;color:#9DB3A8;margin-bottom:5px">'+esc(s.region||'—')+' · '+esc(s.phase)+'</div>';
    var rows = tipRow('CUSS',s,'cuss','cussVendor','cussDate')+tipRow('SBD',s,'sbd','sbdVendor','sbdDate')+tipRow('SBG',s,'sbg','sbgVendor',null);
    var note = s.note ? '<div style="margin-top:7px;padding-top:6px;border-top:1px solid rgba(255,255,255,.14);color:#C7D6CE;white-space:pre-wrap">'+esc(s.note)+'</div>' : '';
    tip.innerHTML = head + rows + note;
    tip.style.display = 'block';
    tip.style.opacity = '1';
    positionTip(x, y);
  }
  function positionTip(x, y){
    var w = tip.offsetWidth, h = tip.offsetHeight;
    var nx = x + 16, ny = y + 16;
    if(nx + w > window.innerWidth - 8) nx = x - w - 16;
    if(ny + h > window.innerHeight - 8) ny = window.innerHeight - h - 8;
    if(ny < 8) ny = 8;
    tip.style.left = nx + 'px';
    tip.style.top = ny + 'px';
  }
  function hideTip(){ tip.style.opacity = '0'; tip.style.display = 'none'; }

  // ---- event delegation ----
  var app = document.getElementById('app');
  app.addEventListener('click', function(e){
    var t = e.target.closest ? e.target.closest('[data-action]') : null;
    if(!t) return;
    var a = t.getAttribute('data-action');
    var id = t.getAttribute('data-id'); if(id!=null) id = +id;
    switch(a){
      case 'addStation': addStation(); break;
      case 'toggleQuick': toggleQuick(); break;
      case 'exportPNG': exportPNG(t.getAttribute('data-target'), t.getAttribute('data-file')); break;
      case 'clearFilters': clearFilters(); break;
      case 'toggleComboMenu': toggleComboMenu(); break;
      case 'closeComboMenu': closeComboMenu(); break;
      case 'toggleCombo': toggleCombo(t.getAttribute('data-combo')); break;
      case 'clearCombo': clearCombo(); break;
      case 'toggleLegendSwatch': state.legendShowShape = !(state.legendShowShape !== false); render(); break;
      case 'kpiBoard': state.showKpiBoard = t.getAttribute('data-kb')==='on'; render(); break;
      case 'resetDisplay': state.chipFont=15; state.legendFont=11; state.legendShowShape=true; state.showKpiBoard=true; render(); break;
      case 'togglePicker': togglePicker(); break;
      case 'toggleExclude': toggleExclude(id); break;
      case 'pickAll': setAllExcluded(false); break;
      case 'pickNone': setAllExcluded(true); break;
      case 'importData': importData(); break;
      case 'saveAsHTML': saveAsHTML(); break;
      case 'toggleLog': toggleLog(); break;
      case 'closeLog': closeLog(e, t); break;
      case 'clearLog': clearLog(); break;
      case 'toggleHidden': toggleHidden(); break;
      case 'closeHidden': closeHidden(e, t); break;
      case 'hideStation': hideStation(id); break;
      case 'unhideStation': unhideStation(id); break;
      case 'unhideAll': unhideAll(); break;
      case 'exportJSON': exportJSON(); break;
      case 'exportCSV': exportCSV(); break;
      case 'resetData': resetData(); break;
      case 'closePanel': closePanel(); break;
      case 'deleteStation': deleteStation(id); break;
      case 'group': setGroupMode(t.getAttribute('data-mode')); break;
      case 'view': setView(t.getAttribute('data-view')); break;
      case 'mapTheme': setMapTheme(t.getAttribute('data-theme')); break;
      case 'mapPalette': setMapPalette(t.getAttribute('data-pal')); break;
      case 'dotColor': setDotColor(t.getAttribute('data-dc')); break;
      case 'kpiRing': setKpiRing(t.getAttribute('data-kr')==='on'); break;
      case 'showNames': setShowNames(t.getAttribute('data-sn')==='on'); break;
      case 'zoomMap': zoomMap(+t.getAttribute('data-k')); break;
      case 'resetMapView': resetMapView(); break;
      case 'resetMapDefaults': resetMapDefaults(); break;
      case 'select': select(id); break;
      case 'toggleKpi': var s=find(id); if(s) setField(id,'kpi',!s.kpi); break;
      case 'toggleBagTag': var sb=find(id); if(sb) setField(id,'bagTag',!sb.bagTag); break;
      case 'setField': setField(id, t.getAttribute('data-field'), t.getAttribute('data-val')); break;
      case 'chipTop':
        if(state.quickMode){ hideTip(); cycle(id,'cuss'); } else select(id);
        break;
      case 'chipBot':
        if(state.quickMode){ hideTip(); cycle(id,'sbd'); } else select(id);
        break;
    }
  });
  app.addEventListener('change', function(e){
    var t = e.target;
    if(t.getAttribute && t.getAttribute('data-dotsize')!==null){ setDotScale(+t.value); return; }
    if(t.getAttribute && t.getAttribute('data-mapnamesize')!==null){ setMapNameScale(+t.value); return; }
    if(t.getAttribute && t.getAttribute('data-maplegendsize')!==null){ setMapLegendFont(+t.value); return; }
    var flt = t.getAttribute && t.getAttribute('data-filter');
    if(flt){ setFilter(flt, t.value); return; }
    var inp = t.getAttribute && t.getAttribute('data-input');
    if(!inp) return;
    var id = +t.getAttribute('data-id');
    var val = t.value;
    if(inp==='code') val = (val||'').toUpperCase();
    else if(NUMFIELDS[inp]) val = Math.max(0, Math.round(+val||0));
    setField(id, inp, val);
  });
  app.addEventListener('mouseover', function(e){
    var c = e.target.closest ? e.target.closest('[data-tip]') : null;
    if(!c) return;
    var s = find(+c.getAttribute('data-tip'));
    if(s) showTip(s, e.clientX, e.clientY);
  });
  app.addEventListener('mousemove', function(e){
    if(tip.style.display==='block') positionTip(e.clientX, e.clientY);
  });
  app.addEventListener('mouseout', function(e){
    var c = e.target.closest ? e.target.closest('[data-tip]') : null;
    if(!c) return;
    var to = e.relatedTarget;
    if(to && c.contains(to)) return;
    hideTip();

  // ---- coverage-card ⇄ station-chip cross-highlight ----
  // hovering a coverage card outlines its stations' chips in the right panel.
  function highlightCard(card, on){
    if(!card) return;
    card.style.borderColor = on ? '#EE7623' : '#E4EBE6';
    card.style.boxShadow = on ? '0 2px 10px rgba(238,118,35,.18)' : 'none';
    var ids = (card.getAttribute('data-cardids')||'').split(',').filter(Boolean);
    ids.forEach(function(id){
      var chip = app.querySelector('.chip[data-tip="'+id+'"]');
      if(!chip) return;
      chip.style.outline = on ? '3px solid #EE7623' : '';
      chip.style.outlineOffset = on ? '2px' : '';
      chip.style.zIndex = on ? '6' : '';
    });
  }
  app.addEventListener('mouseover', function(e){
    var card = e.target.closest ? e.target.closest('.covcard[data-cardids]') : null;
    if(card) highlightCard(card, true);
  });
  app.addEventListener('mouseout', function(e){
    var card = e.target.closest ? e.target.closest('.covcard[data-cardids]') : null;
    if(!card) return;
    var to = e.relatedTarget;
    if(to && card.contains(to)) return;   // still inside the same card
    highlightCard(card, false);
  });

    state.pickerOpen = false; render();

  document.addEventListener('keydown', function(e){

  });

  // ---- dot size slider ----
  // live: only update the % label while dragging (re-rendering mid-drag would
  // destroy the slider element); apply the new size on release (change).
  app.addEventListener('input', function(e){
    var t = e.target;
    if(!t.getAttribute) return;
    if(t.getAttribute('data-dotsize')!==null || t.getAttribute('data-mapnamesize')!==null){
      var lbl = t.parentElement && t.parentElement.querySelector('span:last-child');
      if(lbl) lbl.textContent = Math.round((+t.value)*100)+'%';
      return;
    }
    if(t.getAttribute('data-maplegendsize')!==null){
      var lv = +t.value; state.mapLegendFont = lv;
      var sec = document.getElementById('map-export');
      if(sec) sec.style.setProperty('--map-legend-font', lv+'px');
      var mll = t.parentElement && t.parentElement.querySelector('span:last-child');
      if(mll) mll.textContent = lv+'px';
      return;
    }
    // font-size sliders: update the CSS var live on the board container (no
    // re-render, so the slider keeps focus) and persist the value in state.
    if(t.getAttribute('data-chipfont')!==null){
      var v = +t.value; state.chipFont = v;
      var board = document.getElementById('cuss-board');
      if(board) board.style.setProperty('--chip-font', v+'px');
      var cl = t.parentElement && t.parentElement.querySelector('[data-chipfontlbl]');
      if(cl) cl.textContent = v+'px';
      return;
    }
    if(t.getAttribute('data-legendfont')!==null){
      var lv = +t.value; state.legendFont = lv;
      var board2 = document.getElementById('cuss-board');
      if(board2) board2.style.setProperty('--legend-font', lv+'px');
      var ll = t.parentElement && t.parentElement.querySelector('[data-legendfontlbl]');
      if(ll) ll.textContent = lv+'px';
      return;
    }
  });

  // ---- map zoom (wheel) ----
  // Wheel zoom increases/decreases each intact plate's uniform scale and move;
  // it never non-uniformly deforms a path or crops a station from the frame.
  document.addEventListener('wheel', function(e){
    var svg = e.target.closest ? e.target.closest('#worldmap') : null;
    if(!svg) return;
    e.preventDefault();
    var old=state.mapZoom||1;
    state.mapZoom=quantZoom(old*(e.deltaY<0?1.15:1/1.15));
    state.mapFit=true;
    if(Math.abs(state.mapZoom-old)>0.0001){ state.mapAnim=true; render(); }
  }, { passive:false });

  render();
})();
</script>
</body>
</html>
